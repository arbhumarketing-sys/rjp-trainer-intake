services:
  - type: web
    name: rjp-trainer-intake-server
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: APIFY_TOKEN
        sync: false
      - key: SHARED_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
      - key: ALLOWED_ORIGINS
        value: "*"
