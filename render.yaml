services:
  - type: web
    name: rjp-trainer-intake-server
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm install && npm install -g @anthropic-ai/claude-code
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: APIFY_TOKEN
        sync: false
      # v3.19.0 — multi-account Apify pool. Pool reads any subset of these.
      # Set via Render dashboard → Environment, or via Render API.
      - key: APIFY_TOKEN_STUDY
        sync: false
      - key: APIFY_TOKEN_TRAINING
        sync: false
      - key: APIFY_TOKEN_RAKHI
        sync: false
      - key: SHARED_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
      - key: ALLOWED_ORIGINS
        value: "*"
      # ----- Max-plan Claude integration via the `claude` CLI subprocess.
      # ANTHROPIC_VIA_CLAUDE_CLI=true routes LLM calls through the locally-
      # installed claude CLI (auth'd by CLAUDE_CODE_OAUTH_TOKEN below) so the
      # server bills against the operator's Claude Max subscription instead of
      # API console credits. Get a long-lived token via `claude setup-token`
      # on the operator's Mac, then paste it into Render's Environment tab.
      - key: ANTHROPIC_VIA_CLAUDE_CLI
        value: "true"
      - key: CLAUDE_CODE_OAUTH_TOKEN
        sync: false
      - key: CLAUDE_MODEL_FAST
        value: "claude-haiku-4-5-20251001"
      - key: CLAUDE_MODEL_SMART
        value: "claude-sonnet-4-5"
      # ----- Perplexity Sonar Pro (Phase 1.2 / L1.2). Optional. While unset,
      # the pipeline logs "[Phase 1.2] skipped" once per brief and proceeds to
      # Phase 2 — zero spend, zero behavior change. Drop a pplx-... key from
      # perplexity.ai/api here to enable live-web named-trainer search.
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: PERPLEXITY_MODEL
        value: "sonar-pro"
