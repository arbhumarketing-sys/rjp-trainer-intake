<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trainer Sourcing Portal · RJP Infotek</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f7f8fa;
    --panel: #ffffff;
    --line: #e4e7eb;
    --line-soft: #eef0f3;
    --ink: #1f2937;
    --ink-2: #4b5563;
    --ink-3: #6b7280;
    --ink-4: #9ca3af;
    --accent: #1d4ed8;
    --accent-2: #1e40af;
    --accent-soft: #eef2ff;
    --good: #047857;
    --good-soft: #ecfdf5;
    --warn: #b45309;
    --warn-soft: #fffbeb;
    --bad: #b91c1c;
    --bad-soft: #fef2f2;
    --radius: 8px;
    --radius-sm: 5px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 12px rgba(15,23,42,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ============ LOGIN ============ */
  .login-shade {
    height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
  }
  .login-card {
    width: 380px;
    padding: 32px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow-md);
  }
  .login-brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 22px;
    font-weight: 600; font-size: 14px;
  }
  .login-mark {
    width: 28px; height: 28px;
    border-radius: 6px; background: var(--accent);
    color: white;
    display: grid; place-items: center;
    font-weight: 700; font-size: 12px;
  }
  .login-card h2 { font-size: 19px; font-weight: 600; margin: 0 0 4px; }
  .login-card .lead { color: var(--ink-3); font-size: 13px; margin: 0 0 22px; }

  /* ============ TOPBAR ============ */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    height: 56px; padding: 0 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 600; font-size: 14px;
  }
  .topbar-brand .login-mark { width: 24px; height: 24px; }
  .topbar-brand .sub { color: var(--ink-3); font-weight: 400; font-size: 13px; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .topbar-clock { font-size: 12px; color: var(--ink-3); margin-right: 4px; }

  /* ============ BUTTONS / INPUTS ============ */
  .btn {
    padding: 8px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: var(--panel);
    font-size: 13px; font-weight: 500;
    transition: all 0.1s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--ink-3); }
  .btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
    font-weight: 500;
  }
  .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.primary:disabled { background: var(--ink-4); border-color: var(--ink-4); cursor: not-allowed; }
  .btn.ghost { border-color: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--line-soft); }
  .btn.danger:hover { color: var(--bad); border-color: var(--bad); }
  .btn-wide { width: 100%; justify-content: center; padding: 10px; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .field label.lbl {
    font-weight: 500; font-size: 13px; color: var(--ink);
  }
  .field .hint {
    font-size: 12px; color: var(--ink-3);
    margin-top: -4px;
  }
  .field .err {
    font-size: 12px; color: var(--bad);
    display: none; margin-top: 2px;
  }
  .field.has-error .err { display: block; }
  .field.has-error input, .field.has-error select, .field.has-error textarea {
    border-color: var(--bad);
  }
  .field input, .field select, .field textarea {
    padding: 9px 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius-sm);
    font-size: 14px;
    outline: none;
    transition: border 0.08s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.55; }

  /* Chip group */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 18px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.08s;
    user-select: none;
  }
  .chip:hover { border-color: var(--ink-3); }
  .chip input { display: none; }
  .chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  /* Counter (still nice for default headcount) */
  .counter {
    display: inline-flex; align-items: center; gap: 0;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .counter button {
    width: 32px; height: 32px;
    background: var(--panel); color: var(--ink-2);
    font-size: 16px; line-height: 1;
  }
  .counter button:hover { background: var(--line-soft); }
  .counter .val {
    padding: 0 14px; min-width: 50px;
    font-weight: 600; font-size: 15px;
    text-align: center;
  }

  /* ============ MAIN LAYOUT (in-app) ============ */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 56px);
  }
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--panel);
    padding: 16px 12px;
    overflow-y: auto;
  }
  .sidebar-section {
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 4px 8px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .sidebar-section .count {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; font-weight: 500; color: var(--ink-3);
  }
  .brief-list { display: flex; flex-direction: column; gap: 2px; }
  .brief-item {
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.08s;
    display: flex; flex-direction: column; gap: 4px;
  }
  .brief-item:hover { background: var(--line-soft); }
  .brief-item.active { background: var(--accent-soft); }
  .brief-item-title {
    font-size: 13.5px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .brief-item-meta {
    display: flex; gap: 8px; align-items: center; font-size: 11.5px;
    color: var(--ink-3);
  }

  .status-pill {
    font-size: 10.5px; font-weight: 600;
    padding: 1px 8px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .status-queued    { background: var(--line-soft); color: var(--ink-3); }
  .status-running, .status-scoring, .status-building   { background: var(--accent-soft); color: var(--accent); }
  .status-complete  { background: var(--good-soft); color: var(--good); }
  .status-failed    { background: var(--bad-soft); color: var(--bad); }

  /* main canvas */
  .main {
    overflow-y: auto;
    padding: 32px 28px;
  }
  .center {
    max-width: 720px;
    margin: 0 auto;
  }

  /* ============ STEP HEADER ============ */
  .page-head { margin-bottom: 24px; }
  .page-head h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  .page-head .sub { color: var(--ink-3); font-size: 13.5px; }

  .stepper {
    display: flex; align-items: center; gap: 0;
    padding: 16px 0 24px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--line-soft);
  }
  .stepper-item {
    display: flex; align-items: center; gap: 8px;
    flex: 1;
  }
  .stepper-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    color: var(--ink-3); background: var(--panel);
    font-size: 12px; font-weight: 600;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .stepper-label { font-size: 13px; color: var(--ink-3); }
  .stepper-bar {
    flex: 1; height: 1px; background: var(--line);
  }
  .stepper-item.done .stepper-num { background: var(--good); border-color: var(--good); color: white; }
  .stepper-item.done .stepper-label { color: var(--good); }
  .stepper-item.active .stepper-num { background: var(--accent); border-color: var(--accent); color: white; }
  .stepper-item.active .stepper-label { color: var(--ink); font-weight: 500; }

  /* ============ FORM PANEL ============ */
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 24px;
    margin-bottom: 16px;
  }
  .panel h3 {
    font-size: 14px; font-weight: 600; margin: 0 0 4px;
    color: var(--ink);
  }
  .panel .panel-sub {
    color: var(--ink-3); font-size: 12.5px; margin-bottom: 18px;
  }
  .panel-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4px; padding-top: 18px; border-top: 1px solid var(--line-soft);
  }

  /* roles list */
  .roles-grid {
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 8px;
  }
  .roles-head, .role-row {
    display: grid;
    grid-template-columns: 32px 1.4fr 1fr 1fr 80px 32px;
    gap: 0;
    align-items: center;
  }
  .roles-head {
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .roles-head > div, .role-row > div {
    padding: 8px 10px;
    border-right: 1px solid var(--line-soft);
    min-width: 0;
  }
  .roles-head > div:last-child, .role-row > div:last-child { border-right: none; }
  .role-row { border-bottom: 1px solid var(--line-soft); font-size: 13px; }
  .role-row:last-child { border-bottom: none; }
  .role-row input {
    width: 100%; border: none; outline: none; background: transparent;
    padding: 4px 0; font-size: 13px;
  }
  .role-row input:focus { color: var(--ink); }
  .role-num { color: var(--ink-4); font-family: ui-monospace, monospace; font-size: 12px; text-align: center; }
  .role-del {
    color: var(--ink-4); border-radius: 3px;
    width: 22px; height: 22px;
    display: grid; place-items: center;
    margin: 0 auto;
  }
  .role-del:hover { background: var(--bad-soft); color: var(--bad); }

  /* ============ REVIEW ============ */
  .review-grid {
    display: grid; grid-template-columns: 140px 1fr;
    gap: 8px 18px; padding: 4px 0;
    font-size: 13.5px;
  }
  .review-grid > div:nth-child(odd) {
    color: var(--ink-3); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
    padding-top: 4px;
  }

  /* ============ PROGRESS BOARD ============ */
  .stages {
    display: flex; flex-direction: column; gap: 0;
  }
  .stage {
    display: grid;
    grid-template-columns: 36px 1fr 110px;
    gap: 14px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .stage:last-child { border-bottom: none; }
  .stage-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--panel); color: var(--ink-4);
    font-size: 12px; font-weight: 600;
    display: grid; place-items: center;
  }
  .stage.done .stage-num { background: var(--good); border-color: var(--good); color: white; }
  .stage.active .stage-num { background: var(--accent); border-color: var(--accent); color: white; }
  .stage-info { display: flex; flex-direction: column; gap: 2px; }
  .stage-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .stage-sub { font-size: 12px; color: var(--ink-3); }
  .stage-status {
    text-align: right;
    font-size: 11px; font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .stage.done .stage-status { color: var(--good); }
  .stage.active .stage-status { color: var(--accent); }

  .log {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11.5px;
    max-height: 220px; overflow-y: auto;
    color: var(--ink-2); line-height: 1.6;
    white-space: pre-wrap;
  }
  .log .ts { color: var(--ink-4); }
  .log .err { color: var(--bad); }

  .download-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px;
    background: var(--good-soft);
    border: 1px solid var(--good);
    border-radius: var(--radius);
    color: var(--good); font-weight: 500; font-size: 14px;
  }
  .download-bar .btn { margin-left: auto; }

  .meta-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 22px;
    padding: 14px 18px;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .meta-cell { display: flex; flex-direction: column; gap: 2px; }
  .meta-label {
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .meta-val { font-size: 13.5px; color: var(--ink); }

  /* ============ TOAST ============ */
  .toast {
    position: fixed; bottom: 18px; right: 18px;
    background: var(--ink); color: white;
    padding: 10px 14px; border-radius: var(--radius);
    font-size: 13px; box-shadow: var(--shadow-md);
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--bad); }
  .toast.success { background: var(--good); }

  .empty-side { color: var(--ink-3); font-size: 12.5px; padding: 12px 8px; line-height: 1.55; }

  /* ============ v3.1 widgets ============ */
  .mode-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; }
  .mode-toggle button { padding: 7px 14px; font-size: 12px; font-weight: 500; color: var(--ink-3); background: var(--panel); border-right: 1px solid var(--line); }
  .mode-toggle button:last-child { border-right: none; }
  .mode-toggle button.on { background: var(--accent); color: white; }

  .panel-collapsible { border-top: 1px solid var(--line-soft); margin-top: 14px; padding-top: 12px; }
  .panel-collapsible-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 4px 0; }
  .panel-collapsible-head h4 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-3); font-weight: 600; }
  .panel-collapsible-body { display: none; padding-top: 10px; }
  .panel-collapsible.open .panel-collapsible-body { display: block; }
  .panel-collapsible.open .panel-collapsible-head h4 { color: var(--accent); }

  .advanced-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; }
  .source-toggles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

  .tat-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 12.5px; }
  .tat-bar strong { color: var(--ink); }
  .tat-bar .tat-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .tat-bar.over .tat-dot { background: var(--bad); }
  .tat-bar.done .tat-dot { background: var(--good); }

  .sample-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 8px; }
  .sample-table th, .sample-table td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  .sample-table th { background: var(--bg); font-weight: 600; color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  .sample-table tr:hover td { background: var(--bg); }
  .sample-table .signal-pill { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em; }
  .signal-TRAINER_EXPLICIT, .signal-FREELANCE_TRAINER { background: var(--good-soft); color: var(--good); }
  .signal-TRAINER_IMPLIED, .signal-INSTITUTE { background: var(--accent-soft); color: var(--accent); }
  .signal-PRACTITIONER { background: var(--warn-soft); color: var(--warn); }
  .signal-SPEAKER_ONLY, .signal-BIG_FIRM, .signal-NON_INDIA, .signal-MUSTNOT_HIT, .signal-NOISE { background: var(--bad-soft); color: var(--bad); }

  .feedback-form textarea { width: 100%; min-height: 80px; }
  .frq-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .frq-item { padding: 10px 12px; border: 1px solid var(--line-soft); border-radius: var(--radius-sm); display: grid; grid-template-columns: 1fr auto; gap: 6px 14px; font-size: 12.5px; }
  .frq-item .frq-meta { color: var(--ink-3); font-size: 11.5px; }
  .frq-actions { display: flex; gap: 6px; }
  .frq-actions .btn { padding: 4px 10px; font-size: 11.5px; }
  .frq-status-pending { color: var(--warn); }
  .frq-status-approved { color: var(--good); }
  .frq-status-rejected { color: var(--bad); }
  .frq-status-shipped { color: var(--accent); }

  .quick-intake { display: flex; gap: 8px; margin-top: 14px; }
  .quick-intake input { flex: 1; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stepper-label { display: none; }
    .meta-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ============ v3.2 backend status / cold-start UX ============ */
  .cold-banner {
    display: none;
    padding: 10px 20px;
    background: var(--warn-soft);
    border-bottom: 1px solid var(--warn);
    color: var(--warn);
    font-size: 13px;
    align-items: center;
    gap: 10px;
  }
  .cold-banner.show { display: flex; }
  .cold-banner.error {
    background: var(--bad-soft);
    border-color: var(--bad);
    color: var(--bad);
  }
  .cold-banner.lowyield {
    border-radius: var(--radius);
    margin-bottom: 14px;
    border: 1px solid var(--warn);
  }
  .cold-banner .spinner { display: inline-block; animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .health-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 500;
    background: var(--line-soft);
    color: var(--ink-3);
    cursor: help;
    user-select: none;
  }
  .health-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-4); flex-shrink: 0; }
  .health-pill.warm { background: var(--good-soft); color: var(--good); }
  .health-pill.warm .dot { background: var(--good); }
  .health-pill.warming { background: var(--warn-soft); color: var(--warn); }
  .health-pill.warming .dot { background: var(--warn); animation: pulse 1.4s infinite; }
  .health-pill.cold { background: var(--bad-soft); color: var(--bad); }
  .health-pill.cold .dot { background: var(--bad); }
  @keyframes pulse { 50% { opacity: 0.35; } }

  .btn.warm-btn { font-size: 12px; padding: 7px 11px; }
  .btn.warm-btn .spinner { display: inline-block; }

  /* Now-doing inline progress card — shows the most recent log line so the
     user always sees live activity even between stage transitions. */
  .now-doing {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 13px;
    margin: 12px 0;
  }
  .now-doing .now-spin {
    width: 14px; height: 14px;
    border: 2px solid var(--accent-soft);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    flex-shrink: 0;
  }
  .now-doing strong { font-weight: 600; }
  .now-doing .now-msg {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
  }

  /* Wizard cold-start hint on the Review step */
  .wizard-cold-hint {
    margin: 10px 0 0;
    padding: 10px 14px;
    background: var(--warn-soft);
    border: 1px dashed var(--warn);
    border-radius: var(--radius-sm);
    color: var(--warn);
    font-size: 12.5px;
    display: flex; align-items: center; gap: 8px;
  }

  /* v3.6 — Clarification panel on wizard step 4 (review) */
  .clarify-panel {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; margin: 0 0 18px 0;
    border: 1px solid; border-radius: var(--radius);
  }
  .clarify-panel .clarify-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
  .clarify-panel .clarify-body { flex: 1; min-width: 0; }
  .clarify-panel h4 { margin: 0 0 6px; font-size: 14px; font-weight: 600; color: var(--ink); }
  .clarify-panel p, .clarify-panel ul { margin: 0 0 8px; font-size: 13px; line-height: 1.55; color: var(--ink-2); }
  .clarify-panel ul { padding-left: 18px; }
  .clarify-panel li { margin-bottom: 4px; }
  .clarify-panel code { background: rgba(0,0,0,0.06); padding: 1px 6px; border-radius: 3px; font-size: 12px; font-family: 'Menlo', 'Consolas', monospace; }
  .clarify-panel.loading {
    background: var(--line-soft); border-color: var(--line); color: var(--ink-3);
    font-size: 13px;
  }
  .clarify-panel.ok {
    background: var(--good-soft); border-color: var(--good);
  }
  .clarify-panel.ok .clarify-icon { color: var(--good); }
  .clarify-panel.suggest {
    background: var(--warn-soft); border-color: var(--warn);
  }
  .clarify-panel.suggest .clarify-icon { color: var(--warn); }
  .clarify-panel.blocked {
    background: var(--bad-soft); border-color: var(--bad);
  }
  .clarify-panel.blocked .clarify-icon { color: var(--bad); }
  .clarify-panel textarea {
    width: 100%; min-height: 84px;
    padding: 8px 10px;
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    background: var(--panel);
    font-size: 13px; font-family: 'Menlo', 'Consolas', monospace;
    line-height: 1.5;
    resize: vertical;
  }
  .clarify-panel textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .clarify-panel .clarify-label {
    display: block; margin: 10px 0 4px;
    font-weight: 500; font-size: 12px; color: var(--ink-2);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .clarify-panel .clarify-questions {
    margin: 8px 0 4px; padding: 10px 12px;
    background: rgba(255,255,255,0.5);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .clarify-panel .clarify-questions strong { display: block; margin-bottom: 6px; color: var(--ink); }

  /* v3.9.0 — Iteration history card (Vijay's "send him history & best matches" ask) */
  .iter-card {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-left-width: 4px;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin: 14px 0;
  }
  .iter-card h3 { margin: 0 0 10px; font-size: 14px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .iter-card .rev-count { font-weight: 400; color: var(--ink-3); font-size: 12px; }
  .iter-row { padding: 10px 0; border-bottom: 1px dashed var(--line-soft); }
  .iter-row:last-child { border-bottom: none; padding-bottom: 0; }
  .iter-row:first-child { padding-top: 0; }
  .iter-rev { font-weight: 600; font-size: 13px; color: var(--accent); margin-bottom: 4px; }
  .iter-meta { font-size: 12px; color: var(--ink-3); margin-bottom: 6px; }
  .iter-low { display: inline-block; margin-left: 8px; padding: 1px 6px; background: var(--warn-soft); color: var(--warn); border-radius: 8px; font-weight: 500; font-size: 10.5px; }
  .iter-fb { background: var(--bg); padding: 6px 10px; border-left: 2px solid var(--accent); margin: 6px 0; font-size: 12.5px; color: var(--ink-2); white-space: pre-wrap; }
  .iter-names { font-size: 12.5px; color: var(--ink-2); margin: 4px 0; }
  .iter-diff { font-size: 12px; margin: 2px 0; padding-left: 12px; }
  .iter-new { color: var(--good); }
  .iter-dropped { color: var(--bad); }

  /* v3.10.0 — Chat-style input view */
  .chat-stepper { display: flex; align-items: center; gap: 0; padding: 12px 0 20px; margin-bottom: 4px; border-bottom: 1px solid var(--line-soft); }
  .parsed-card { padding: 16px 18px; border: 1px solid var(--accent); border-left-width: 4px; border-radius: var(--radius); background: var(--panel); margin-bottom: 16px; }
  .pf-grid { display: grid; grid-template-columns: 140px 1fr; gap: 10px 14px; align-items: start; }
  .pf-grid > div:nth-child(odd).pf-label {
    color: var(--ink-3); font-size: 11.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    padding-top: 6px;
  }
  .pf-grid input, .pf-grid textarea { width: 100%; padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 13px; outline: none; }
  .pf-grid input:focus, .pf-grid textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .pf-grid textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

  .q-card { padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 12px; background: var(--panel); }
  .q-card:hover { border-color: var(--ink-3); }
  .q-text { font-weight: 500; font-size: 14px; margin-bottom: 10px; color: var(--ink); }
  .q-multi-hint { color: var(--ink-3); font-size: 11.5px; margin-left: 8px; font-weight: 400; font-style: italic; }
  .q-choices { display: flex; flex-wrap: wrap; gap: 6px; }
  .q-choice {
    padding: 7px 14px; border-radius: 18px;

  .q-choice:hover { border-color: var(--ink-3); }
  .q-choice.on { background: var(--accent); color: white; border-color: var(--accent); font-weight: 500; }
  .chat-link-advanced { display: block; text-align: right; margin-top: 14px; font-size: 12.5px; color: var(--ink-3); text-decoration: none; }
  .chat-link-advanced:hover { color: var(--accent); text-decoration: underline; }

  /* v3.9.0 — Verdict scoring buttons (Selected / Hold / Rejected per Saranya's grading taxonomy) */
  .verdict-cell { white-space: nowrap; min-width: 240px; }
  .verdict-btn {
    padding: 4px 9px; margin-right: 4px;
    font-size: 11.5px;
    border: 1px solid var(--line);

    user-select: none;
  }
  .verdict-btn:hover { border-color: var(--ink-3); }
  .verdict-btn:disabled { cursor: not-allowed; opacity: 0.5; }
  .verdict-btn.vselected.on { background: var(--good); border-color: var(--good); color: white; font-weight: 600; }
  .verdict-btn.vhold.on     { background: var(--warn); border-color: var(--warn); color: white; font-weight: 600; }
  .verdict-btn.vrejected.on { background: var(--bad);  border-color: var(--bad);  color: white; font-weight: 600; }
  .verdict-btn.vselected:hover:not(.on) { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .verdict-btn.vhold:hover:not(.on)     { background: var(--warn-soft); color: var(--warn); border-color: var(--warn); }
  .verdict-btn.vrejected:hover:not(.on) { background: var(--bad-soft);  color: var(--bad);  border-color: var(--bad); }
</style>

<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================ */
/* CONFIG                                                       */
/* ============================================================ */
const API_BASE = 'https://rjp-trainer-intake-server.onrender.com';   // Render service for the RJP trainer-intake portal
const REPO_CACHE = 'rjp_portal_repo_v2';

const DOMAIN_OPTIONS = [
  'AWS', 'Microsoft Azure', 'Google Cloud Platform', 'Salesforce',
  'Backstage.io', 'Kubernetes', 'DevOps', 'Data Science / ML',
  'Java', 'Python', 'Cybersecurity', 'SAP', 'Other (specify below)'
];
const LOCATIONS = ['All India', 'Bangalore', 'Mumbai', 'Delhi / NCR', 'Hyderabad', 'Pune', 'Chennai', 'Remote OK'];
const OUTPUT_OPTIONS = [
  { v: 'xlsx',  l: 'Excel (.xlsx)',  d: 'Default. Best for review and editing.' },
  { v: 'sheet', l: 'Google Sheet',   d: 'Shared link, real-time collaboration.' },
  { v: 'pdf',   l: 'PDF',            d: 'Read-only, easy to share externally.' },
];

/* ============================================================ */
/* STATE                                                        */
/* ============================================================ */
let state = {
  token: 'open',  // auth removed 2026-05-01; sentinel keeps Authorization header machinery happy
  briefs: [],
  featureRequests: [],
  persistentExclusions: [],  // v3.2 — always-exclude list applied to every brief
  view: 'home',         // home | new | detail | admin
  step: 1,              // 1..4 inside new-brief flow
  activeBriefId: null,
  liveBrief: null,
  pollTimer: null,
  draft: defaultDraft(),
  defaultExclusions: [],
  // v3.2 backend health surface — drives the cold-start banner + warm-up button
  backendStatus: 'unknown',  // unknown | warming | warm | cold
  backendUptime: null,       // seconds since last server boot
  backendDirty: null,        // { briefs, featureRequests } from /healthz
  backendCheckedAt: null,    // ms timestamp
  healthTimer: null,
  // v3.6 conversational pre-submit clarification (wizard step 4)
  clarifyLoading: false,
  clarifyResult: null,       // null | { status, issues, draft, questions, ... }
  clarifyReqId: 0,           // bumped per request, used to drop stale responses
  // v3.9.0 — candidate scoring cache. { briefId: { candidateUrl: 'selected'|'hold'|'rejected' } }
  candidateScores: {},
  scoresLoadedFor: null,     // briefId for which scores were last fetched (avoid re-fetching during polls)
  // v3.10.0 — chat-style input flow (replaces wizard as default for "+ New brief")
  chatStep: 1,               // 1=describe, 2=review parse, 3=clarifying questions, 4=submit
  chatInput: '',
  chatLoading: false,
  chatParsed: null,          // { title, domain, keywords[], must[], should[], mustNot[], searchMode, customExclusions[], ... }
  chatQuestions: [],         // [{ id, question, choices, multiSelect }]
  chatAnswers: {},           // { questionId: choiceId | [choiceId, ...] }
  chatOpName: '',
  chatOpEmail: '',
  // v3.13.0 — persistent operator identity. Hydrated on boot from localStorage
  // key 'rjp_operator'. When present, the wizard's Step 1 and the chat-flow's
  // Step 4 name+email inputs are hidden — submission auto-uses this identity.
  // Header chip shows "Submitting as <name>" with a Switch link to clear.
  operator: null,            // { name, email } or null
};

/* v3.13.0 — operator identity helpers (localStorage-backed). No real auth —
   the portal is internal-only per Gulshan, but team members each get their
   own attribution baked into the brief without re-typing every time. */
const OP_KEY = 'rjp_operator';
function loadOperator() {
  try {
    const raw = localStorage.getItem(OP_KEY);
    if (!raw) return null;
    const o = JSON.parse(raw);
    if (o && typeof o.name === 'string' && typeof o.email === 'string' && o.name.trim() && o.email.trim()) return o;
  } catch (_) {}
  return null;
}
function saveOperator(name, email) {
  const o = { name: String(name || '').trim().slice(0, 80), email: String(email || '').trim().slice(0, 120) };
  if (!o.name || !o.email) return null;
  localStorage.setItem(OP_KEY, JSON.stringify(o));
  state.operator = o;
  return o;
}
function clearOperator() {
  localStorage.removeItem(OP_KEY);
  state.operator = null;
}

/* v3.14.0 — chat-flow draft auto-save. Persists the in-progress chat (text,
   parse, clarifying answers, current step) to localStorage on every state
   change, so a tab close, accidental nav, or reload doesn't lose work.
   24-hour TTL — older drafts auto-expire. Cleared on successful submit
   or explicit Discard via the "+ New brief" prompt. */
const CHAT_DRAFT_KEY = 'rjp_chat_draft';
const CHAT_DRAFT_TTL_MS = 24 * 60 * 60 * 1000;
function saveChatDraft() {
  const empty = state.chatStep === 1 && !(state.chatInput || '').trim();
  if (empty) return clearChatDraft();
  try {
    localStorage.setItem(CHAT_DRAFT_KEY, JSON.stringify({
      chatStep:      state.chatStep,
      chatInput:     state.chatInput,
      chatParsed:    state.chatParsed,
      chatQuestions: state.chatQuestions,
      chatAnswers:   state.chatAnswers,
      ts:            Date.now(),
    }));
  } catch (_) {}
}
function loadChatDraft() {
  try {
    const raw = localStorage.getItem(CHAT_DRAFT_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d || typeof d.ts !== 'number' || (Date.now() - d.ts) > CHAT_DRAFT_TTL_MS) {
      clearChatDraft();
      return null;
    }
    return d;
  } catch (_) { return null; }
}
function clearChatDraft() {
  try { localStorage.removeItem(CHAT_DRAFT_KEY); } catch (_) {}
}

/* v3.13.0 — first-visit identity prompt. Painless overlay; required to dismiss
   so we always have an audit trail. Re-shown when the user clicks Switch. */
function showWelcomeModal() {
  const existing = document.getElementById('welcome-modal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'welcome-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.55);display:flex;align-items:center;justify-content:center;z-index:9999;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:8px;padding:28px 30px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <h2 style="margin:0 0 6px 0;font-size:20px;">Welcome to the Trainer Sourcing Portal</h2>
      <p style="margin:0 0 18px 0;color:#475569;font-size:13.5px;">Tell us who you are once. We'll attribute every brief you submit to this identity — no need to re-type your name and email each time.</p>
      <div style="margin-bottom:12px;">
        <label style="display:block;font-size:12px;font-weight:600;color:#1e293b;margin-bottom:4px;">Your name</label>
        <input id="wm-name" placeholder="e.g. Rakhi Dev" style="width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:4px;font-size:14px;" />
      </div>
      <div style="margin-bottom:18px;">
        <label style="display:block;font-size:12px;font-weight:600;color:#1e293b;margin-bottom:4px;">Your email</label>
        <input id="wm-email" type="email" placeholder="you@rjpinfotek.com" style="width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:4px;font-size:14px;" />
      </div>
      <div id="wm-err" style="color:#b91c1c;font-size:12px;margin-bottom:10px;display:none;"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button id="wm-save" style="background:#2563eb;color:#fff;border:none;padding:9px 18px;border-radius:4px;font-weight:600;font-size:13.5px;cursor:pointer;">Save & continue →</button>
      </div>
      <div style="margin-top:14px;font-size:11px;color:#94a3b8;">Stored locally in your browser. Click Switch in the header to change later.</div>
    </div>
  `;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('wm-name').focus(), 50);
  const submit = () => {
    const name = document.getElementById('wm-name').value.trim();
    const email = document.getElementById('wm-email').value.trim();
    const err = document.getElementById('wm-err');
    if (!name) { err.textContent = 'Please enter your name.'; err.style.display = 'block'; return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { err.textContent = 'Please enter a valid email address.'; err.style.display = 'block'; return; }
    saveOperator(name, email);
    state.draft.operatorName = name;
    state.draft.operatorEmail = email;
    state.chatOpName = name;
    state.chatOpEmail = email;
    overlay.remove();
    render();
    toast('Identity saved. You won’t be asked again.', 'success');
  };
  document.getElementById('wm-save').addEventListener('click', submit);
  ['wm-name', 'wm-email'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
  });
}
function defaultDraft() {
  return {
    operatorName: '', operatorEmail: '',
    domain: '', customDomain: '',
    keywords: '',                       // v3.1 — multi-keyword (one per line)
    searchMode: 'std',                  // std | niche
    roles: [{ title: '', skill: '', bucket: '', count: 5 }],
    location: 'All India',
    must: '',                           // v3.1 — boolean must-include
    should: '',                         // v3.1 — boolean should-include
    mustNot: '',                        // v3.1 — boolean must-NOT-include
    clientCompany: '',                  // v3.1 — exclusion: client itself
    clientPrincipal: '',                // v3.1 — exclusion: their existing principal (e.g. HCL)
    customExclusions: '',               // v3.1 — extra companies, one per line
    advancedOpen: false,
    advanced: { queryDepth: 12, sources: {
      linkedin: true, urbanpro: true, youtube: true, udemy: true, blogs: true,
      // v3.3 — new source toggles, all default ON
      indianPlatforms: true, authorityDirectories: true, coursePlatforms: true,
      meetup: true, eventbrite: true, github: true,
    } },
    steering: '',
    outputFormat: 'xlsx',
    deadline: '',
    quickIntake: '',                    // v3.1 — free-text one-liner intake
  };
}

/* ============================================================ */
/* API                                                          */
/* ============================================================ */
async function api(method, path, body) {
  const url = API_BASE + path;
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const opts = { method, headers };
  if (body !== undefined) opts.body = JSON.stringify(body);
  let res;
  try { res = await fetch(url, opts); }
  catch (e) { throw new Error('Cannot reach the server. Is it running? ' + e.message); }
  if (res.status === 401) { throw new Error('Authorization rejected by server.'); }
  if (!res.ok) {
    const text = await res.text();
    throw new Error('Server error (' + res.status + '): ' + text.slice(0, 200));
  }
  const ct = res.headers.get('Content-Type') || '';
  return ct.includes('application/json') ? res.json() : res;
}

async function loadBriefs() {
  try {
    const data = await api('GET', '/api/briefs');
    state.briefs = data.briefs || [];
    localStorage.setItem(REPO_CACHE, JSON.stringify(state.briefs));
  } catch (e) {
    const cached = localStorage.getItem(REPO_CACHE);
    if (cached) state.briefs = JSON.parse(cached);
    toast(e.message, 'error');
  }
}

/* ============================================================ */
/* BACKEND HEALTH (v3.2)                                        */
/* ============================================================ */
// Render free tier spins down web services after 15 min idle. The first
// request after spin-down takes ~22s to wake the dyno, init the Postgres
// pool, and warm the claude CLI subprocess. Without this code, RJP would
// see a "frozen" UI for 25s with no feedback. With this code, they see a
// banner explaining what's happening and a status pill showing live state.
//
// Three states:
//   warm     — last /healthz returned in <5s and was 200
//   warming  — /healthz is in flight, OR last response was slow (>5s)
//   cold     — /healthz failed or timed out (>35s)
//
// The "Warm up" button in the topbar fires checkBackend() on demand so
// users can pre-warm before they click "+ New brief". A 60s interval also
// re-checks automatically so the pill stays current.

async function checkBackend() {
  const start = Date.now();
  // First-ever check shows 'warming' so the pill isn't blank
  if (state.backendStatus === 'unknown') state.backendStatus = 'warming';
  renderBackendIndicators();
  try {
    const ctrl = new AbortController();
    const timeoutId = setTimeout(() => ctrl.abort(), 35000);
    const res = await fetch(API_BASE + '/healthz', { signal: ctrl.signal, headers: { 'Cache-Control': 'no-cache' } });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error('healthz HTTP ' + res.status);
    const data = await res.json();
    const elapsed = Date.now() - start;
    state.backendStatus = elapsed > 5000 ? 'warming' : 'warm';
    state.backendUptime = data.uptimeSec || null;
    state.backendDirty = data.dirty || null;
    state.backendCheckedAt = Date.now();
    return state.backendStatus;
  } catch (e) {
    state.backendStatus = 'cold';
    state.backendCheckedAt = Date.now();
    return 'cold';
  } finally {
    renderBackendIndicators();
  }
}

function renderBackendIndicators() {
  const pill = document.getElementById('health-pill');
  const banner = document.getElementById('cold-banner');
  if (pill) {
    pill.className = 'health-pill ' + state.backendStatus;
    const labels = {
      unknown: 'Checking…',
      warming: 'Warming up…',
      warm:    'Backend warm',
      cold:    'Backend offline',
    };
    pill.innerHTML = `<span class="dot"></span>${labels[state.backendStatus] || 'Unknown'}`;
    const dirtyNote = state.backendDirty && (state.backendDirty.briefs || state.backendDirty.featureRequests)
      ? `\n${state.backendDirty.briefs} brief(s), ${state.backendDirty.featureRequests} FR(s) pending re-persist`
      : '';
    pill.title = state.backendUptime != null
      ? `Backend uptime: ${formatDuration(state.backendUptime)}\nLast checked: ${new Date(state.backendCheckedAt).toLocaleTimeString()}${dirtyNote}\nClick "Warm up" if a submission feels slow.`
      : 'Click "Warm up" if a submission feels slow.';
  }
  if (banner) {
    if (state.backendStatus === 'cold') {
      banner.className = 'cold-banner show error';
      banner.innerHTML = '<span>⚠</span><span><strong>Backend unreachable.</strong> Render may be cold-starting (~25s) or down. Click <strong>Warm up</strong> in the top bar to retry. New submissions will queue but will fail to start until the backend is back.</span>';
    } else if (state.backendStatus === 'warming') {
      banner.className = 'cold-banner show';
      banner.innerHTML = '<span class="spinner">⟳</span><span><strong>Backend was idle and is warming up.</strong> First request usually takes 20-30s. The status pill in the top bar turns green when ready. Submissions made now will work — just slower than usual.</span>';
    } else {
      banner.className = 'cold-banner';
    }
  }
}

function startHealthLoop() {
  if (state.healthTimer) clearInterval(state.healthTimer);
  // 60s polling so the pill reflects live state without spamming the server.
  // The keep-warm GH Actions cron pings every 10 min from outside; this is for
  // in-tab freshness only.
  state.healthTimer = setInterval(checkBackend, 60 * 1000);
}

async function getBrief(id) {
  return (await api('GET', '/api/briefs/' + encodeURIComponent(id))).brief;
}

async function pollActive() {
  if (!state.activeBriefId) return;
  try {
    const b = await getBrief(state.activeBriefId);
    state.liveBrief = b;
    const ix = state.briefs.findIndex(x => x.id === b.id);
    if (ix >= 0) state.briefs[ix] = b; else state.briefs.unshift(b);
    if (state.view === 'detail') renderMain();
    renderSidebar();
    if (b.status === 'complete' || b.status === 'failed') stopPolling();
  } catch (e) { /* keep polling */ }
}
function startPolling() { stopPolling(); pollActive(); state.pollTimer = setInterval(pollActive, 2500); }
function stopPolling() { if (state.pollTimer) clearInterval(state.pollTimer); state.pollTimer = null; }

function wireShell() {
  // v3.13.0 — Switch identity link in the header chip. Clears stored operator
  // and re-shows the welcome modal so the next user can claim the session.
  const switchBtn = document.getElementById('btn-switch-op');
  if (switchBtn) switchBtn.addEventListener('click', (e) => {
    e.preventDefault();
    if (!confirm('Clear saved identity and switch user?')) return;
    clearOperator();
    state.draft.operatorName = '';
    state.draft.operatorEmail = '';
    state.chatOpName = '';
    state.chatOpEmail = '';
    render();
    showWelcomeModal();
  });
  document.getElementById('btn-home').addEventListener('click', () => { state.view = 'home'; state.activeBriefId = null; stopPolling(); renderMain(); renderSidebar(); });
  document.getElementById('btn-admin').addEventListener('click', async () => { state.view = 'admin'; state.activeBriefId = null; stopPolling(); await Promise.all([loadFeatureRequests(), loadPersistentExclusions()]); renderMain(); renderSidebar(); });
  document.getElementById('btn-new').addEventListener('click', () => {
    // v3.14.0 — if there's an unsaved chat draft, offer to resume before
    // wiping it. Stops the "I lost an hour of typing" failure mode.
    const draft = loadChatDraft();
    if (draft) {
      const ageMin = Math.max(1, Math.round((Date.now() - draft.ts) / 60000));
      const stepNames = ['Describe', 'Review parse', 'Refine answers', 'Submit'];
      const stepName = stepNames[(draft.chatStep || 1) - 1] || 'previous step';
      const ok = confirm(`You have an unsaved chat draft from ~${ageMin} min ago (at "${stepName}").\n\nClick OK to resume it.\nClick Cancel to discard it and start fresh.`);
      if (ok) {
        state.chatStep      = draft.chatStep      || 1;
        state.chatInput     = draft.chatInput     || '';
        state.chatParsed    = draft.chatParsed    || null;
        state.chatQuestions = draft.chatQuestions || [];
        state.chatAnswers   = draft.chatAnswers   || {};
        state.chatLoading   = false;
        state.view = 'chat';
        renderMain(); renderSidebar();
        return;
      }
      clearChatDraft();
    }
    // v3.10.0 — default "+ New brief" goes to the chat-style input (Perplexity-flow).
    // The advanced wizard is still reachable via a link on chat step 1.
    state.view = 'chat'; chatReset();
    renderMain(); renderSidebar();
  });
  document.getElementById('btn-warm').addEventListener('click', async () => {
    const btn = document.getElementById('btn-warm');
    btn.disabled = true;
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="spinner">⟳</span> Warming…';
    const result = await checkBackend();
    btn.disabled = false;
    btn.innerHTML = orig;
    if (result === 'warm')        toast('Backend is warm — submissions will be instant.', 'success');
    else if (result === 'cold')   toast('Backend still unreachable. Wait ~30s and try Warm up again.', 'error');
    else                          toast('Backend warming up. Submission will start within ~10-15s.', '');
  });
  startClock();
}

/* ============================================================ */
/* v3.9.0 — Candidate scoring + iteration helpers               */
/* ============================================================ */
async function loadScoresForBrief(briefId, force) {
  // Idempotent — caches by scoresLoadedFor so polling re-renders don't spam /scores
  if (!force && state.scoresLoadedFor === briefId) return state.candidateScores[briefId] || {};
  state.scoresLoadedFor = briefId;
  try {
    const r = await api('GET', '/api/briefs/' + encodeURIComponent(briefId) + '/scores');
    const map = {};
    for (const s of (r.scores || [])) map[s.candidateUrl] = s.score;
    state.candidateScores[briefId] = map;
  } catch (e) {
    console.warn('loadScoresForBrief failed:', e.message);
    state.candidateScores[briefId] = state.candidateScores[briefId] || {};
  }
  return state.candidateScores[briefId];
}

async function setCandidateScore(briefId, candidateUrl, candidateName, verdict) {
  if (!candidateUrl) { toast('No LinkedIn URL on this row — can\'t score.', 'error'); return; }
  state.candidateScores[briefId] = state.candidateScores[briefId] || {};
  const prev = state.candidateScores[briefId][candidateUrl];
  state.candidateScores[briefId][candidateUrl] = verdict;
  renderMain();
  try {
    await api('POST', '/api/briefs/' + encodeURIComponent(briefId) + '/scores', {
      candidateUrl, candidateName: candidateName || '', score: verdict,
    });
    toast('Marked ' + verdict + '.', 'success');
  } catch (e) {
    if (prev) state.candidateScores[briefId][candidateUrl] = prev;
    else delete state.candidateScores[briefId][candidateUrl];
    renderMain();
    toast('Save failed: ' + e.message, 'error');
  }
}

async function clearCandidateScore(briefId, candidateUrl) {
  state.candidateScores[briefId] = state.candidateScores[briefId] || {};
  const prev = state.candidateScores[briefId][candidateUrl];
  delete state.candidateScores[briefId][candidateUrl];
  renderMain();
  try {
    await api('DELETE', '/api/briefs/' + encodeURIComponent(briefId) + '/scores?candidateUrl=' + encodeURIComponent(candidateUrl));
    toast('Score cleared.', 'success');
  } catch (e) {
    if (prev) state.candidateScores[briefId][candidateUrl] = prev;
    renderMain();
    toast('Clear failed: ' + e.message, 'error');
  }
}

function renderVerdictButtons(briefId, candidateUrl, candidateName) {
  if (!candidateUrl) return '<span class="hint" style="font-size:11.5px;color:var(--ink-4);">no URL</span>';
  const current = (state.candidateScores[briefId] || {})[candidateUrl] || '';
  const verdicts = [
    { v: 'selected', label: '✓ Selected' },
    { v: 'hold',     label: '⏸ Hold' },
    { v: 'rejected', label: '✗ Rejected' },
  ];
  return verdicts.map(({ v, label }) => `
    <button class="verdict-btn v${v} ${current === v ? 'on' : ''}"
            data-url="${esc(candidateUrl)}"
            data-name="${esc(candidateName || '')}"
            data-verdict="${v}"
            title="${current === v ? 'Click again to clear this verdict' : 'Mark this candidate as ' + v}">${label}</button>
  `).join('');
}

function extractCandNameForBtn(c) {
  const t = (c && c.title) || '';
  if (!t) return '';
  // Title is typically "<Name> — <bio>" or "<Name> at <Co>"
  return t.split(/[—–]|\s-\s|\bat\s/i)[0].trim().replace(/\s*\(.*?\)\s*/g, ' ').replace(/[.,;:|]+$/, '').trim().slice(0, 100);
}

function renderIterationSummary(b) {
  const items = (b && b.iterationSummary) || [];
  if (!items.length) return '';
  const totalRuns = items.length;
  // Newest first — operator wants most recent at the top
  const ordered = items.slice().reverse();
  const rows = ordered.map((s) => {
    const dt = s.ts
      ? new Date(s.ts).toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' })
      : '?';
    const newSec = (s.newlyEntered && s.newlyEntered.length)
      ? `<div class="iter-diff iter-new">+ Newly in top 5: ${s.newlyEntered.map(esc).join(', ')}</div>` : '';
    const dropSec = (s.dropped && s.dropped.length)
      ? `<div class="iter-diff iter-dropped">− Dropped from top 5: ${s.dropped.map(esc).join(', ')}</div>` : '';
    const fbSec = s.feedbackApplied
      ? `<div class="iter-fb"><strong>Feedback applied:</strong> ${esc(s.feedbackApplied)}</div>` : '';
    const lowSec = s.lowYield ? '<span class="iter-low">low-yield</span>' : '';
    const topSec = (s.topNames || []).length
      ? `<div class="iter-names"><strong>Top 5:</strong> ${s.topNames.map(esc).join(', ')}</div>`
      : '<div class="iter-names" style="color:var(--ink-4);">(no top names — check brief)</div>';
    return `
      <div class="iter-row">
        <div class="iter-rev">Run #${(s.rev || 0) + 1}</div>
        <div class="iter-meta"><strong>${s.candidateCount || 0} candidates</strong> · ${esc(dt)} ${lowSec}</div>
        ${fbSec}
        ${topSec}
        ${newSec}
        ${dropSec}
      </div>`;
  }).join('');
  return `
    <div class="iter-card">
      <h3>Iteration history <span class="rev-count">${totalRuns} run${totalRuns === 1 ? '' : 's'} · newest first</span></h3>
      ${rows}
    </div>`;
}

async function loadFeatureRequests() {
  try {
    const r = await api('GET', '/api/feature-requests');
    state.featureRequests = r.featureRequests || [];
  } catch (e) { toast(e.message, 'error'); }
}

async function loadPersistentExclusions() {
  try {
    const r = await api('GET', '/api/persistent-exclusions');
    state.persistentExclusions = r.persistentExclusions || [];
  } catch (e) { toast(e.message, 'error'); }
}
function startClock() {
  const c = document.getElementById('clock');
  if (!c) return;
  const tick = () => {
    const d = new Date();
    c.textContent = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) + ' IST';
  };
  tick(); setInterval(tick, 30000);
}

/* ---------- SIDEBAR ---------- */
function renderSidebar() {
  const list = document.getElementById('sb-list');
  const count = document.getElementById('sb-count');
  if (!list) return;
  count.textContent = state.briefs.length;
  if (!state.briefs.length) {
    list.innerHTML = '<div class="empty-side">No briefs yet. Click <strong>+ New brief</strong> to start.</div>';
    return;
  }
  list.innerHTML = state.briefs.map(b => {
    const isActive = b.id === state.activeBriefId;
    const title = (b.title || '(untitled)').slice(0, 80);
    const sub = (b.domain || '—') + ' · ' + ((b.roles || []).length) + ' role' + ((b.roles || []).length === 1 ? '' : 's');
    return `<div class="brief-item ${isActive ? 'active' : ''}" data-id="${esc(b.id)}">
      <span class="brief-item-title">${esc(title)}</span>
      <span class="brief-item-meta">
        <span>${esc(sub)}</span>
        <span class="status-pill status-${b.status || 'queued'}">${b.status || 'queued'}</span>
      </span>
    </div>`;
  }).join('');
  list.querySelectorAll('.brief-item').forEach(el => {
    el.addEventListener('click', () => {
      state.activeBriefId = el.dataset.id;
      state.view = 'detail';
      startPolling();
      renderMain(); renderSidebar();
    });
  });
}

/* ---------- MAIN ---------- */
function renderMain() {
  const m = document.getElementById('main');
  if (!m) return;
  if (state.view === 'chat') return renderChat(m);
  if (state.view === 'new') return renderWizard(m);
  if (state.view === 'admin') return renderAdmin(m);
  if (state.view === 'detail' && state.activeBriefId) return renderDetail(m);
  return renderHome(m);
}

/* ============================================================ */
/* v3.10.0 — Chat-style input (replaces wizard as default)      */
/* ============================================================ */
function chatReset() {
  state.chatStep = 1;
  state.chatInput = '';
  state.chatLoading = false;
  state.chatParsed = null;
  state.chatQuestions = [];
  state.chatAnswers = {};
  clearChatDraft(); // v3.14.0 — explicit reset wipes any saved draft too
}

function chatHeadline(step) {
  return ([
    'What kind of trainer are you looking for?',
    'Here\'s what I understood',
    'A few quick questions to refine the search',
    'Ready to submit',
  ])[step - 1] || '';
}
function chatSub(step) {
  return ([
    'Describe in plain English. Claude parses it and generates clarifying follow-ups (Perplexity-style).',
    'Edit any field if it\'s wrong. Then continue to follow-up questions.',
    'Click answers — they refine the search. All optional. Skip what doesn\'t apply.',
    'Final review. Steering field shows the assembled CLARIFYING ANSWERS block that\'ll inform Sonnet rerank.',
  ])[step - 1] || '';
}

function renderChat(m) {
  const labels = ['Describe', 'Review', 'Refine', 'Submit'];
  const stepEls = labels.map((lbl, i) => {
    const n = i + 1;
    const cls = n === state.chatStep ? 'active' : (n < state.chatStep ? 'done' : '');
    return `
      <div class="stepper-item ${cls}">
        <div class="stepper-num">${cls === 'done' ? '✓' : n}</div>
        <div class="stepper-label">${lbl}</div>
      </div>
      ${n < labels.length ? '<div class="stepper-bar"></div>' : ''}
    `;
  }).join('');

  m.innerHTML = `
    <div class="center">
      <div class="page-head">
        <h1>${esc(chatHeadline(state.chatStep))}</h1>
        <div class="sub">${esc(chatSub(state.chatStep))}</div>
      </div>
      <div class="chat-stepper">${stepEls}</div>
      <div id="chat-body"></div>
      <a href="#" class="chat-link-advanced" id="chat-link-wizard">Use the advanced wizard form instead →</a>
    </div>
  `;
  document.getElementById('chat-link-wizard').addEventListener('click', e => {
    e.preventDefault();
    state.view = 'new'; state.step = 1; state.draft = defaultDraft();
    renderMain();
  });
  if (state.chatStep === 1) renderChatStep1();
  else if (state.chatStep === 2) renderChatStep2();
  else if (state.chatStep === 3) renderChatStep3();
  else if (state.chatStep === 4) renderChatStep4();
}

function renderChatStep1() {
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <div class="panel">
      <div class="field">
        <label class="lbl">Describe the brief</label>
        <textarea id="chat-input" rows="6" placeholder="Examples:
• 5 Splunk Cloud Observability trainers, India, exclude TCS, niche, freelance only
• Need an SAP S/4HANA FICO consultant in Bengaluru with 12+ years and lab setup
• Aurora PostgreSQL DBA — 3 trainers, by Friday, exclude HCL/Wipro">${esc(state.chatInput)}</textarea>
        <div class="hint">Claude (Haiku) parses this into structured fields. You'll see the parse on the next step and can edit anything.</div>
      </div>
      <div class="panel-actions">
        <span style="color:var(--ink-3);font-size:12px;">${state.chatLoading ? 'Parsing…' : ''}</span>
        <button class="btn primary" id="btn-chat-send" ${state.chatLoading ? 'disabled' : ''}>${state.chatLoading ? 'Parsing…' : 'Send →'}</button>
      </div>
    </div>
  `;
  const ta = document.getElementById('chat-input');
  ta.addEventListener('input', e => { state.chatInput = e.target.value; saveChatDraft(); });
  ta.focus();
  document.getElementById('btn-chat-send').addEventListener('click', chatHandleSend);
}

async function chatHandleSend() {
  const text = (document.getElementById('chat-input').value || '').trim();
  if (!text || text.length < 10) { toast('Please describe in at least 10 characters.', 'error'); return; }
  state.chatInput = text;
  state.chatLoading = true;
  renderChatStep1();
  try {
    const r = await api('POST', '/api/briefs/parse', { text });
    state.chatParsed = r.parsed || {};
    saveChatDraft();  // v3.14.0 — persist parse result so reload doesn't burn a Haiku call
    // Default mode if not set
    if (!state.chatParsed.searchMode) state.chatParsed.searchMode = 'std';
    state.chatLoading = false;
    state.chatStep = 2;
    renderChat(document.getElementById('main'));
  } catch (e) {
    state.chatLoading = false;
    toast('Parse failed: ' + e.message, 'error');
    renderChatStep1();
  }
}

function chatArrToLines(arr) {
  if (!arr) return '';
  if (Array.isArray(arr)) return arr.join('\n');
  return String(arr);
}
function chatLinesToArr(s) {
  return String(s || '').split('\n').map(x => x.trim()).filter(Boolean);
}

function renderChatStep2() {
  const p = state.chatParsed || {};
  // Suggest a domain if missing — derive from first keyword
  const suggestedDomain = p.domain || (Array.isArray(p.keywords) && p.keywords[0]) || '';
  document.getElementById('chat-body').innerHTML = `
    <div class="panel">
      <div class="parsed-card">
        <div class="pf-grid">
          <div class="pf-label">Title</div>          <div><input id="cp-title" value="${esc(p.title || '')}" placeholder="e.g. Splunk Observability Trainer + Lab Setup" /></div>
          <div class="pf-label">Domain</div>         <div><input id="cp-domain" value="${esc(suggestedDomain)}" placeholder="e.g. Splunk, Salesforce, AWS" /></div>
          <div class="pf-label">Keywords</div>       <div><textarea id="cp-keywords" rows="3" placeholder="One per line, e.g.&#10;Splunk Observability Trainer&#10;Splunk Cloud Consultant">${esc(chatArrToLines(p.keywords))}</textarea></div>
          <div class="pf-label">Must include</div>   <div><textarea id="cp-must" rows="2" placeholder="e.g. certified, freelance">${esc(chatArrToLines(p.must))}</textarea></div>
          <div class="pf-label">Should include</div> <div><textarea id="cp-should" rows="2" placeholder="e.g. ITSI, MLTK, dashboards">${esc(chatArrToLines(p.should))}</textarea></div>
          <div class="pf-label">Must NOT</div>       <div><textarea id="cp-mustnot" rows="2" placeholder="e.g. intern, junior">${esc(chatArrToLines(p.mustNot))}</textarea></div>
          <div class="pf-label">Mode</div>           <div>
            <div class="mode-toggle" id="cp-mode">
              <button type="button" data-m="std"   class="${(p.searchMode || 'std') === 'std' ? 'on' : ''}">Standard</button>
              <button type="button" data-m="niche" class="${p.searchMode === 'niche' ? 'on' : ''}">Niche</button>
            </div>
          </div>
          <div class="pf-label">Custom exclusions</div><div><textarea id="cp-customex" rows="2" placeholder="One per line. Big-firm list (TCS/Wipro/etc.) is auto-applied.">${esc(chatArrToLines(p.customExclusions))}</textarea></div>
        </div>
      </div>
      <div class="panel-actions">
        <button class="btn" id="btn-chat-back">← Back</button>
        <button class="btn primary" id="btn-chat-questions" ${state.chatLoading ? 'disabled' : ''}>${state.chatLoading ? 'Generating questions…' : 'Continue to follow-ups →'}</button>
      </div>
    </div>
  `;
  document.querySelectorAll('#cp-mode button').forEach(b => b.addEventListener('click', () => {
    state.chatParsed.searchMode = b.dataset.m;
    document.querySelectorAll('#cp-mode button').forEach(x => x.classList.toggle('on', x.dataset.m === state.chatParsed.searchMode));
  }));
  document.getElementById('btn-chat-back').addEventListener('click', () => {
    state.chatStep = 1; renderChat(document.getElementById('main'));
  });
  document.getElementById('btn-chat-questions').addEventListener('click', chatHandleAskQuestions);
}

function chatCollectStep2() {
  state.chatParsed = state.chatParsed || {};
  state.chatParsed.title    = (document.getElementById('cp-title').value || '').trim();
  state.chatParsed.domain   = (document.getElementById('cp-domain').value || '').trim();
  state.chatParsed.keywords = chatLinesToArr(document.getElementById('cp-keywords').value);
  state.chatParsed.must     = chatLinesToArr(document.getElementById('cp-must').value);
  state.chatParsed.should   = chatLinesToArr(document.getElementById('cp-should').value);
  state.chatParsed.mustNot  = chatLinesToArr(document.getElementById('cp-mustnot').value);
  state.chatParsed.customExclusions = chatLinesToArr(document.getElementById('cp-customex').value);
  saveChatDraft();  // v3.14.0
}

async function chatHandleAskQuestions() {
  chatCollectStep2();
  state.chatLoading = true;
  renderChatStep2();
  try {
    const r = await api('POST', '/api/briefs/ask-questions', {
      ...state.chatParsed,
      raw: state.chatInput,
    });
    state.chatQuestions = r.questions || [];
    state.chatAnswers = {};
    state.chatLoading = false;
    state.chatStep = 3;
    saveChatDraft();  // v3.14.0 — persist questions so reload doesn't burn another Haiku call
    renderChat(document.getElementById('main'));
  } catch (e) {
    state.chatLoading = false;
    toast('Question generation failed: ' + e.message + '. Skipping to submit.', 'error');
    state.chatQuestions = [];
    state.chatStep = 4;
    renderChat(document.getElementById('main'));
  }
}

function renderChatStep3() {
  const qs = state.chatQuestions || [];
  if (!qs.length) {
    document.getElementById('chat-body').innerHTML = `
      <div class="panel">
        <div class="hint">No clarifying questions generated — Claude thinks the draft is complete enough. Continuing to submit.</div>
        <div class="panel-actions">
          <button class="btn" id="btn-chat-back">← Back</button>
          <button class="btn primary" id="btn-chat-skip-q">Continue to submit →</button>
        </div>
      </div>
    `;
    document.getElementById('btn-chat-back').addEventListener('click', () => { state.chatStep = 2; renderChat(document.getElementById('main')); });
    document.getElementById('btn-chat-skip-q').addEventListener('click', () => { state.chatStep = 4; renderChat(document.getElementById('main')); });
    return;
  }
  const cards = qs.map(q => {
    const ans = state.chatAnswers[q.id];
    const choices = q.choices.map(c => {
      const isOn = q.multiSelect
        ? (Array.isArray(ans) && ans.includes(c.id))
        : (ans === c.id);
      return `<button type="button" class="q-choice ${isOn ? 'on' : ''}" data-q="${esc(q.id)}" data-c="${esc(c.id)}">${esc(c.label)}</button>`;
    }).join('');
    return `
      <div class="q-card" data-qid="${esc(q.id)}">
        <div class="q-text">${esc(q.question)}${q.multiSelect ? '<span class="q-multi-hint">(pick all that apply)</span>' : ''}</div>
        <div class="q-choices">${choices}</div>
      </div>
    `;
  }).join('');
  const answeredCount = Object.keys(state.chatAnswers).length;
  document.getElementById('chat-body').innerHTML = `
    <div class="panel">
      <div class="panel-sub">${qs.length} question${qs.length === 1 ? '' : 's'} · ${answeredCount} answered. All optional — answers refine the search via steering.</div>
      ${cards}
      <div class="panel-actions" style="margin-top:14px;">
        <button class="btn" id="btn-chat-back">← Back</button>
        <button class="btn primary" id="btn-chat-to-submit">Continue to submit →</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.q-choice').forEach(b => b.addEventListener('click', () => {
    const qid = b.dataset.q;
    const cid = b.dataset.c;
    const q = state.chatQuestions.find(x => x.id === qid);
    if (!q) return;
    if (q.multiSelect) {
      const cur = Array.isArray(state.chatAnswers[qid]) ? state.chatAnswers[qid].slice() : [];
      const i = cur.indexOf(cid);
      if (i >= 0) cur.splice(i, 1); else cur.push(cid);
      if (cur.length) state.chatAnswers[qid] = cur; else delete state.chatAnswers[qid];
    } else {
      if (state.chatAnswers[qid] === cid) delete state.chatAnswers[qid];
      else state.chatAnswers[qid] = cid;
    }
    saveChatDraft();  // v3.14.0
    renderChatStep3();
  }));
  document.getElementById('btn-chat-back').addEventListener('click', () => { state.chatStep = 2; renderChat(document.getElementById('main')); });
  document.getElementById('btn-chat-to-submit').addEventListener('click', () => { state.chatStep = 4; renderChat(document.getElementById('main')); });
}

function chatBuildClarifyingBlock() {
  const lines = [];
  for (const q of (state.chatQuestions || [])) {
    const ans = state.chatAnswers[q.id];
    if (!ans) continue;
    const labels = (Array.isArray(ans) ? ans : [ans])
      .map(a => (q.choices.find(c => c.id === a) || {}).label)
      .filter(Boolean);
    if (!labels.length) continue;
    lines.push(`- ${q.question} ${labels.join(', ')}`);
  }
  return lines.length ? 'CLARIFYING ANSWERS (operator chose these in chat-flow):\n' + lines.join('\n') : '';
}

function renderChatStep4() {
  const p = state.chatParsed || {};

  document.getElementById('chat-body').innerHTML = `

        </div>
      </div>

      ${state.operator ? `
      <div style="margin-top:14px;padding:10px 12px;background:#f1f5f9;border-radius:4px;font-size:12.5px;color:#334155;">
        Submitting as <strong>${esc(state.operator.name)}</strong> · ${esc(state.operator.email)}
        <a href="#" id="chat-switch-op" style="margin-left:8px;color:#1E40AF;text-decoration:underline;font-size:11.5px;">Switch</a>
      </div>
      ` : `
      <div class="field" style="margin-top:14px;">
        <label class="lbl">Operator name <span style="color:var(--ink-3);font-weight:400;font-size:11.5px;">— for the audit trail</span></label>
        <input id="chat-op-name" placeholder="e.g. your name" value="${esc(state.chatOpName || '')}" />
      </div>
      <div class="field">
        <label class="lbl">Operator email</label>
        <input id="chat-op-email" type="email" placeholder="you@rjpinfotek.com" value="${esc(state.chatOpEmail || '')}" />
      </div>`}

      <div class="panel-actions">
        <button class="btn" id="btn-chat-back">← Back to questions</button>
        <button class="btn primary" id="btn-chat-submit" ${state.chatLoading ? 'disabled' : ''}>${state.chatLoading ? 'Submitting…' : '✓ Submit & start sourcing'}</button>
      </div>
    </div>
  `;
  if (state.operator) {
    state.chatOpName = state.operator.name;
    state.chatOpEmail = state.operator.email;
    const sw = document.getElementById('chat-switch-op');
    if (sw) sw.addEventListener('click', (e) => { e.preventDefault(); if (confirm('Clear saved identity and switch user?')) { clearOperator(); render(); showWelcomeModal(); } });
  } else {
    document.getElementById('chat-op-name').addEventListener('input', e => state.chatOpName = e.target.value);
    document.getElementById('chat-op-email').addEventListener('input', e => state.chatOpEmail = e.target.value);
  }
  document.getElementById('btn-chat-back').addEventListener('click', () => {
    state.chatStep = state.chatQuestions.length ? 3 : 2;
    renderChat(document.getElementById('main'));
  });
  document.getElementById('btn-chat-submit').addEventListener('click', chatHandleSubmit);
}

async function chatHandleSubmit() {
  const name = (state.chatOpName || '').trim();
  const email = (state.chatOpEmail || '').trim();
  if (!name) { toast('Please enter operator name.', 'error'); return; }
  if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { toast('Please enter a valid email.', 'error'); return; }

  // v3.13.0 — first chat-submit also captures identity for future briefs.
  // No-op if a stored operator already matches; harmless overwrite otherwise.
  saveOperator(name, email);

  const p = state.chatParsed || {};
  const clarifyBlock = chatBuildClarifyingBlock();
  const finalSteering = [(p.steering || '').trim(), clarifyBlock].filter(Boolean).join('\n\n').trim();

  state.chatLoading = true;
  renderChatStep4();
  try {
    const payload = {
      title: p.title || (Array.isArray(p.keywords) && p.keywords[0]) || 'Chat-flow brief',
      domain: p.domain || '',
      geo: 'India',
      keywords: p.keywords || [],
      must: p.must || [],
      should: p.should || [],
      mustNot: p.mustNot || [],
      customExclusions: p.customExclusions || [],
      searchMode: p.searchMode === 'niche' ? 'niche' : 'std',
      steering: finalSteering,
      operator: { name, email },
      // Chat flow already engaged the operator with question-driven refinement
      // — pipeline can skip its own auto-cleaner (no double-Haiku).
      confirmedClean: true,
    };
    const r = await api('POST', '/api/briefs', payload);
    await loadBriefs();
    state.activeBriefId = r.brief.id;
    state.view = 'detail';
    clearChatDraft();  // v3.14.0 — submit succeeded, draft is no longer needed
    chatReset();
    state.chatLoading = false;
    startPolling();
    renderMain(); renderSidebar();
    toast('Brief submitted via chat — full pipeline running.', 'success');
  } catch (e) {
    state.chatLoading = false;
    toast(e.message, 'error');
    renderChatStep4();
  }
}

function renderWizard(m) {
  const labels = ['Operator', 'Domain & roles', 'Location & specifics', 'Review'];
  const stepEls = labels.map((lbl, i) => {
    const n = i + 1;
    const cls = n === state.step ? 'active' : (n < state.step ? 'done' : '');
    return `
      <div class="stepper-item ${cls}">
        <div class="stepper-num">${cls === 'done' ? '✓' : n}</div>
        <div class="stepper-label">${lbl}</div>
      </div>
      ${n < labels.length ? '<div class="stepper-bar"></div>' : ''}
    `;
  }).join('');

  m.innerHTML = `
    <div class="center">
      <div class="page-head">
        <h1>New sourcing brief</h1>
        <div class="sub">Fill in what you need. The pipeline runs automatically — no waiting on email approvals.</div>
      </div>
      <div class="stepper">${stepEls}</div>
      <div id="wizard-body"></div>
    </div>
  `;
  if (state.step === 1) renderStep1();
  else if (state.step === 2) renderStep2();
  else if (state.step === 3) renderStep3();
  else if (state.step === 4) renderStep4();
}

function navButtons(canNext, nextLabel) {
  return `
    <div class="panel-actions">
      <button class="btn" id="btn-back" ${state.step === 1 ? 'style="visibility:hidden;"' : ''}>← Back</button>
      <button class="btn primary" id="btn-next" ${!canNext ? 'disabled' : ''}>${nextLabel || 'Next →'}</button>
    </div>
  `;
}
function wireNav() {
  const back = document.getElementById('btn-back');
  if (back) back.addEventListener('click', () => {
    // v3.6: when leaving review step (4), clear any stale clarification
    // verdict so re-entry triggers a fresh /api/briefs/clarify call against
    // the (possibly edited) draft.
    if (state.step === 4) {
      state.clarifyResult = null;
      state.clarifyLoading = false;
    }
    state.step--;
    renderWizard(document.getElementById('main'));
  });
}

   header chip's identity. Only renders when the operator has not been
   captured yet, which on a fresh browser also triggers showWelcomeModal(). */

  });

  // render roles
  const rolesDiv = document.getElementById('roles-rows');
  function paintRoles() {
    rolesDiv.innerHTML = state.draft.roles.map((r, i) => `
      <div class="role-row" data-i="${i}">
        <div class="role-num">${i + 1}</div>
        <div><input data-k="title" value="${esc(r.title)}" placeholder="e.g. Salesforce Admin Trainer" /></div>
        <div><input data-k="skill" value="${esc(r.skill)}" placeholder="e.g. Sales Cloud + Lightning" /></div>
        <div><input data-k="bucket" value="${esc(r.bucket)}" placeholder="Functional / Technical / etc." /></div>
        <div><input data-k="count" type="number" min="1" value="${r.count}" /></div>
        <div><button class="role-del" type="button" title="Remove">×</button></div>
      </div>
    `).join('');
    rolesDiv.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', e => {
        const i = parseInt(e.target.closest('.role-row').dataset.i, 10);
        const k = e.target.dataset.k;
        if (k === 'count') state.draft.roles[i][k] = parseInt(e.target.value, 10) || 1;
        else state.draft.roles[i][k] = e.target.value;
      });
    });
    rolesDiv.querySelectorAll('.role-del').forEach(b => b.addEventListener('click', e => {
      const i = parseInt(e.target.closest('.role-row').dataset.i, 10);
      if (state.draft.roles.length === 1) { toast('Keep at least one role row.', 'error'); return; }
      state.draft.roles.splice(i, 1);
      paintRoles();
    }));
  }
  paintRoles();
  document.getElementById('btn-add-role').addEventListener('click', () => {
    state.draft.roles.push({ title: '', skill: '', bucket: '', count: 5 });
    paintRoles();
  });

  // mode toggle
  document.querySelectorAll('#mode-toggle button').forEach(b => b.addEventListener('click', () => {
    state.draft.searchMode = b.dataset.mode;
    document.querySelectorAll('#mode-toggle button').forEach(x => x.classList.toggle('on', x.dataset.mode === state.draft.searchMode));
    document.getElementById('mode-hint').textContent = state.draft.searchMode === 'niche'
      ? 'Niche — rare tech. Pipeline runs adjacent-tech expansion via Claude, weights small-firm Founders/Principals higher, and falls back to institutes/Udemy/YouTube if profiles are thin. Target TAT ~12 min.'
      : 'Standard — well-supplied tech (AWS, Salesforce, Java). LinkedIn-first, ~12 queries, target TAT ~8 min.';
  }));

  document.getElementById('btn-next').addEventListener('click', () => {
    let ok = true;
    if (!state.draft.domain) { document.getElementById('f-domain').closest('.field').classList.add('has-error'); ok = false; }
    if (state.draft.domain.startsWith('Other')) {
      state.draft.customDomain = document.getElementById('f-custom').value.trim();
    }
    state.draft.keywords = document.getElementById('f-keywords').value;
    const validRoles = state.draft.roles.filter(r => r.title.trim());
    const hasKeywords = state.draft.keywords.trim().length > 0;
    if (!validRoles.length && !hasKeywords) { toast('Add at least one keyword (or a role with a title).', 'error'); ok = false; }
    if (!ok) return;
    state.draft.roles = (validRoles.length ? validRoles : []).map(r => ({ ...r, count: r.count || 1 }));
    state.step = 3;
    renderWizard(document.getElementById('main'));
  });
}
