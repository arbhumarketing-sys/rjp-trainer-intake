<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trainer Sourcing Portal · RJP Infotek</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f7f8fa;
    --panel: #ffffff;
    --line: #e4e7eb;
    --line-soft: #eef0f3;
    --ink: #1f2937;
    --ink-2: #4b5563;
    --ink-3: #6b7280;
    --ink-4: #9ca3af;
    --accent: #1d4ed8;
    --accent-2: #1e40af;
    --accent-soft: #eef2ff;
    --good: #047857;
    --good-soft: #ecfdf5;
    --warn: #b45309;
    --warn-soft: #fffbeb;
    --bad: #b91c1c;
    --bad-soft: #fef2f2;
    --radius: 8px;
    --radius-sm: 5px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 12px rgba(15,23,42,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ============ LOGIN ============ */
  .login-shade {
    height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
  }
  .login-card {
    width: 380px;
    padding: 32px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow-md);
  }
  .login-brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 22px;
    font-weight: 600; font-size: 14px;
  }
  .login-mark {
    width: 28px; height: 28px;
    border-radius: 6px; background: var(--accent);
    color: white;
    display: grid; place-items: center;
    font-weight: 700; font-size: 12px;
  }
  .login-card h2 { font-size: 19px; font-weight: 600; margin: 0 0 4px; }
  .login-card .lead { color: var(--ink-3); font-size: 13px; margin: 0 0 22px; }

  /* ============ TOPBAR ============ */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    height: 56px; padding: 0 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  /* v3.21.0 — clickable logo + hover affordance */
  #topbar-brand-link:hover { opacity: 0.7; }
  .topbar-brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 600; font-size: 14px;
  }
  .topbar-brand .login-mark { width: 24px; height: 24px; }
  .topbar-brand .sub { color: var(--ink-3); font-weight: 400; font-size: 13px; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .topbar-clock { font-size: 12px; color: var(--ink-3); margin-right: 4px; }

  /* ============ BUTTONS / INPUTS ============ */
  .btn {
    padding: 8px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: var(--panel);
    font-size: 13px; font-weight: 500;
    transition: all 0.1s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--ink-3); }
  .btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
    font-weight: 500;
  }
  .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.primary:disabled { background: var(--ink-4); border-color: var(--ink-4); cursor: not-allowed; }
  .btn.ghost { border-color: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--line-soft); }
  .btn.danger:hover { color: var(--bad); border-color: var(--bad); }
  .btn-wide { width: 100%; justify-content: center; padding: 10px; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .field label.lbl {
    font-weight: 500; font-size: 13px; color: var(--ink);
  }
  .field .hint {
    font-size: 12px; color: var(--ink-3);
    margin-top: -4px;
  }
  .field .err {
    font-size: 12px; color: var(--bad);
    display: none; margin-top: 2px;
  }
  .field.has-error .err { display: block; }
  .field.has-error input, .field.has-error select, .field.has-error textarea {
    border-color: var(--bad);
  }
  .field input, .field select, .field textarea {
    padding: 9px 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius-sm);
    font-size: 14px;
    outline: none;
    transition: border 0.08s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.55; }

  /* Chip group */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 18px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.08s;
    user-select: none;
  }
  .chip:hover { border-color: var(--ink-3); }
  .chip input { display: none; }
  .chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  /* Counter (still nice for default headcount) */
  .counter {
    display: inline-flex; align-items: center; gap: 0;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .counter button {
    width: 32px; height: 32px;
    background: var(--panel); color: var(--ink-2);
    font-size: 16px; line-height: 1;
  }
  .counter button:hover { background: var(--line-soft); }
  .counter .val {
    padding: 0 14px; min-width: 50px;
    font-weight: 600; font-size: 15px;
    text-align: center;
  }

  /* ============ MAIN LAYOUT (in-app) ============ */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 56px);
  }
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--panel);
    padding: 16px 12px;
    overflow-y: auto;
  }
  .sidebar-section {
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 4px 8px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .sidebar-section .count {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; font-weight: 500; color: var(--ink-3);
  }
  /* v3.15.0 — sidebar search + filter chips */
  .sidebar-filter { padding: 0 4px 8px; display: flex; flex-direction: column; gap: 6px; }
  .sidebar-filter input[type="search"] {
    width: 100%; padding: 6px 9px; border: 1px solid var(--line); border-radius: 4px;
    font-size: 12.5px; background: var(--bg); color: var(--ink-1);
    box-sizing: border-box;
  }
  .sidebar-filter input[type="search"]:focus { outline: none; border-color: #1e40af; }
  .sb-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .sb-chip {
    padding: 3px 8px; border: 1px solid var(--line); background: transparent;
    border-radius: 11px; font-size: 11px; color: var(--ink-2); cursor: pointer; line-height: 1.3;
  }
  .sb-chip:hover { background: var(--bg); }
  .sb-chip.on { background: #1e40af; color: #fff; border-color: #1e40af; }
  /* v3.13.0 header me-pill (was missing — chip used inline style only) */
  .me-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 11px; font-size: 12px;
    background: #f1f5f9; color: #1e293b; border: 1px solid var(--line);
  }
  .empty-side a { color: #1e40af; text-decoration: underline; }

  /* v3.27.0 — nested source toggles */
  .src-group { margin: 8px 0; padding: 8px 10px; background: #fff; border: 1px solid var(--line); border-radius: 5px; }
  .src-parent { font-weight: 600; padding: 4px 0 6px !important; }
  .src-grp-count { font-size: 11px; color: var(--ink-3); font-weight: 400; margin-left: 4px; }
  .src-children { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; padding-left: 22px; margin-top: 4px; padding-top: 6px; border-top: 1px dashed var(--line); }
  .src-child { padding: 3px 4px !important; }
  .src-child .src-name { font-size: 12px; font-weight: 500; }
  .src-child .src-sub  { font-size: 10.5px; color: var(--ink-3); margin-top: 0; font-family: ui-monospace, Menlo, monospace; }
  /* v3.26.0 — source toggles in chat Step 2 */
  .src-panel {
    border: 1px solid var(--line); border-radius: 6px;
    padding: 10px 14px; background: #fafbfc;
  }
  .src-panel summary {
    cursor: pointer; list-style: none; display: flex; justify-content: space-between;
    align-items: center; gap: 12px; user-select: none;
  }
  .src-panel summary::-webkit-details-marker { display: none; }
  .src-panel summary::before {
    content: '▸'; color: var(--ink-3); font-size: 11px; transition: transform 0.15s;
  }
  .src-panel[open] summary::before { transform: rotate(90deg); }
  .src-summary-label { font-size: 13px; font-weight: 600; color: var(--ink); flex: 1; }
  .src-summary-count { font-size: 11.5px; color: var(--ink-3); font-weight: 400; }
  .src-list {
    margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line);
  }
  .src-row {
    display: flex; align-items: flex-start; gap: 8px; padding: 6px 4px;
    cursor: pointer; border-radius: 4px;
  }
  .src-row:hover { background: rgba(37, 99, 235, 0.04); }
  .src-row.disabled { cursor: not-allowed; opacity: 0.65; }
  .src-row input[type="checkbox"] { margin-top: 2px; flex-shrink: 0; }
  .src-label { display: flex; flex-direction: column; flex: 1; }
  .src-name { font-size: 12.5px; font-weight: 500; color: var(--ink); }
  .src-sub { font-size: 11px; color: var(--ink-3); margin-top: 1px; }
  .src-status {
    font-size: 10.5px; padding: 2px 6px; border-radius: 9px; align-self: flex-start;
    font-weight: 600;
  }
  .src-status.ok      { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
  .src-status.pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

  /* v3.26.0 — loading meter for chat-flow transitions */
  .loading-meter { margin-top: 14px; padding: 10px 12px; background: #f8fafc; border-radius: 6px; border: 1px solid var(--line); }
  .loading-meter-bar {
    height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden;
  }
  .loading-meter-fill {
    height: 100%; background: linear-gradient(90deg, #2563eb, #3b82f6);
    border-radius: 3px; width: 0%;
    animation: loadFill var(--est-time, 6s) cubic-bezier(.18,.89,.32,1) forwards;
  }
  @keyframes loadFill {
    0%   { width: 0%; }
    50%  { width: 65%; }
    80%  { width: 85%; }
    100% { width: 95%; }
  }
  .loading-meter-label {
    text-align: center; font-size: 12px; color: #475569; margin-top: 8px;
  }
  .loading-meter-eta {
    color: #94a3b8; font-size: 11px; margin-left: 4px;
    font-family: ui-monospace, Menlo, monospace;
  }

  /* v3.18.0 — outreach dropdown */
  .outreach-sel {
    padding: 3px 6px; border: 1px solid var(--line); border-radius: 4px;
    font-size: 11.5px; background: #fff; color: var(--ink-1); min-width: 130px;
  }

  /* v3.17.0 — client-lifecycle status chips */
  .cs-chip {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10.5px; font-weight: 600; line-height: 1.5; letter-spacing: 0.02em;
    text-transform: uppercase; border: 1px solid transparent;
  }
  .cs-pending            { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
  .cs-shared_with_client { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
  .cs-candidate_booked   { background: #dcfce7; color: #166534; border-color: #86efac; }
  .cs-client_rejected    { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
  .cs-done_no_booking    { background: #f5f5f4; color: #57534e; border-color: #d6d3d1; }
  .cs-select { padding: 5px 8px; border: 1px solid var(--line); border-radius: 4px; font-size: 12px; background: #fff; }
  .cs-mini   { font-size: 9px; padding: 1px 5px; border-radius: 8px; margin-left: 4px; vertical-align: middle; }

  /* v3.16.0 — cost breakdown strip on detail view */
  .cost-breakdown {
    margin-top: 6px; padding: 8px 12px; background: #f8fafc;
    border: 1px dashed var(--line); border-radius: 4px;
    font-size: 12px; color: var(--ink-2);
  }
  .cost-breakdown code {
    background: #fff; padding: 1px 5px; border-radius: 3px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: #1e40af;
  }

  .brief-list { display: flex; flex-direction: column; gap: 2px; }
  .brief-item {
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.08s;
    display: flex; flex-direction: column; gap: 4px;
  }
  .brief-item:hover { background: var(--line-soft); }
  .brief-item.active { background: var(--accent-soft); }
  .brief-item-title {
    font-size: 13.5px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .brief-item-meta {
    display: flex; gap: 8px; align-items: center; font-size: 11.5px;
    color: var(--ink-3);
  }

  .status-pill {
    font-size: 10.5px; font-weight: 600;
    padding: 1px 8px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .status-queued    { background: var(--line-soft); color: var(--ink-3); }
  .status-running, .status-scoring, .status-building   { background: var(--accent-soft); color: var(--accent); }
  .status-complete  { background: var(--good-soft); color: var(--good); }
  .status-failed    { background: var(--bad-soft); color: var(--bad); }

  /* main canvas */
  .main {
    overflow-y: auto;
    padding: 32px 28px;
  }
  .center {
    max-width: 720px;
    margin: 0 auto;
  }

  /* ============ STEP HEADER ============ */
  .page-head { margin-bottom: 24px; }
  .page-head h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  .page-head .sub { color: var(--ink-3); font-size: 13.5px; }

  .stepper {
    display: flex; align-items: center; gap: 0;
    padding: 16px 0 24px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--line-soft);
  }
  .stepper-item {
    display: flex; align-items: center; gap: 8px;
    flex: 1;
  }
  .stepper-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    color: var(--ink-3); background: var(--panel);
    font-size: 12px; font-weight: 600;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .stepper-label { font-size: 13px; color: var(--ink-3); }
  .stepper-bar {
    flex: 1; height: 1px; background: var(--line);
  }
  .stepper-item.done .stepper-num { background: var(--good); border-color: var(--good); color: white; }
  .stepper-item.done .stepper-label { color: var(--good); }
  .stepper-item.active .stepper-num { background: var(--accent); border-color: var(--accent); color: white; }
  .stepper-item.active .stepper-label { color: var(--ink); font-weight: 500; }

  /* ============ FORM PANEL ============ */
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 24px;
    margin-bottom: 16px;
  }
  .panel h3 {
    font-size: 14px; font-weight: 600; margin: 0 0 4px;
    color: var(--ink);
  }
  .panel .panel-sub {
    color: var(--ink-3); font-size: 12.5px; margin-bottom: 18px;
  }
  .panel-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4px; padding-top: 18px; border-top: 1px solid var(--line-soft);
  }

  /* roles list */
  .roles-grid {
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 8px;
  }
  .roles-head, .role-row {
    display: grid;
    grid-template-columns: 32px 1.4fr 1fr 1fr 80px 32px;
    gap: 0;
    align-items: center;
  }
  .roles-head {
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .roles-head > div, .role-row > div {
    padding: 8px 10px;
    border-right: 1px solid var(--line-soft);
    min-width: 0;
  }
  .roles-head > div:last-child, .role-row > div:last-child { border-right: none; }
  .role-row { border-bottom: 1px solid var(--line-soft); font-size: 13px; }
  .role-row:last-child { border-bottom: none; }
  .role-row input {
    width: 100%; border: none; outline: none; background: transparent;
    padding: 4px 0; font-size: 13px;
  }
  .role-row input:focus { color: var(--ink); }
  .role-num { color: var(--ink-4); font-family: ui-monospace, monospace; font-size: 12px; text-align: center; }
  .role-del {
    color: var(--ink-4); border-radius: 3px;
    width: 22px; height: 22px;
    display: grid; place-items: center;
    margin: 0 auto;
  }
  .role-del:hover { background: var(--bad-soft); color: var(--bad); }

  /* ============ REVIEW ============ */
  .review-grid {
    display: grid; grid-template-columns: 140px 1fr;
    gap: 8px 18px; padding: 4px 0;
    font-size: 13.5px;
  }
  .review-grid > div:nth-child(odd) {
    color: var(--ink-3); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
    padding-top: 4px;
  }

  /* ============ PROGRESS BOARD ============ */
  .stages {
    display: flex; flex-direction: column; gap: 0;
  }
  .stage {
    display: grid;
    grid-template-columns: 36px 1fr 110px;
    gap: 14px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .stage:last-child { border-bottom: none; }
  .stage-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--panel); color: var(--ink-4);
    font-size: 12px; font-weight: 600;
    display: grid; place-items: center;
  }
  .stage.done .stage-num { background: var(--good); border-color: var(--good); color: white; }
  .stage.active .stage-num { background: var(--accent); border-color: var(--accent); color: white; }
  .stage-info { display: flex; flex-direction: column; gap: 2px; }
  .stage-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .stage-sub { font-size: 12px; color: var(--ink-3); }
  .stage-status {
    text-align: right;
    font-size: 11px; font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .stage.done .stage-status { color: var(--good); }
  .stage.active .stage-status { color: var(--accent); }

  .log {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11.5px;
    max-height: 220px; overflow-y: auto;
    color: var(--ink-2); line-height: 1.6;
    white-space: pre-wrap;
  }
  .log .ts { color: var(--ink-4); }
  .log .err { color: var(--bad); }

  .download-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px;
    background: var(--good-soft);
    border: 1px solid var(--good);
    border-radius: var(--radius);
    color: var(--good); font-weight: 500; font-size: 14px;
  }
  .download-bar .btn { margin-left: auto; }

  .meta-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 22px;
    padding: 14px 18px;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .meta-cell { display: flex; flex-direction: column; gap: 2px; }
  .meta-label {
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .meta-val { font-size: 13.5px; color: var(--ink); }

  /* ============ TOAST ============ */
  .toast {
    position: fixed; bottom: 18px; right: 18px;
    background: var(--ink); color: white;
    padding: 10px 14px; border-radius: var(--radius);

  .empty-side { color: var(--ink-3); font-size: 12.5px; padding: 12px 8px; line-height: 1.55; }

  /* ============ v3.1 widgets ============ */

  .sample-table th { background: var(--bg); font-weight: 600; color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }

  .signal-TRAINER_EXPLICIT, .signal-FREELANCE_TRAINER { background: var(--good-soft); color: var(--good); }
  .signal-TRAINER_IMPLIED, .signal-INSTITUTE { background: var(--accent-soft); color: var(--accent); }
  .signal-PRACTITIONER { background: var(--warn-soft); color: var(--warn); }
  .signal-SPEAKER_ONLY, .signal-BIG_FIRM, .signal-NON_INDIA, .signal-MUSTNOT_HIT, .signal-NOISE { background: var(--bad-soft); color: var(--bad); }

  .feedback-form textarea { width: 100%; min-height: 80px; }
  .frq-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .frq-item { padding: 10px 12px; border: 1px solid var(--line-soft); border-radius: var(--radius-sm); display: grid; grid-template-columns: 1fr auto; gap: 6px 14px; font-size: 12.5px; }
  .frq-item .frq-meta { color: var(--ink-3); font-size: 11.5px; }
  .frq-actions { display: flex; gap: 6px; }
  .frq-actions .btn { padding: 4px 10px; font-size: 11.5px; }
  .frq-status-pending { color: var(--warn); }

  .frq-status-rejected { color: var(--bad); }

  .quick-intake { display: flex; gap: 8px; margin-top: 14px; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stepper-label { display: none; }
    .meta-grid { grid-template-columns: 1fr 1fr; }

  /* ============ v3.2 backend status / cold-start UX ============ */
  .cold-banner {
    display: none;
    padding: 10px 20px;
    background: var(--warn-soft);
    border-bottom: 1px solid var(--warn);
    color: var(--warn);
    font-size: 13px;
    align-items: center;
    gap: 10px;
  }
  .cold-banner.show { display: flex; }

    background: var(--bad-soft);

  @keyframes spin { to { transform: rotate(360deg); } }

  .health-pill {
    display: inline-flex; align-items: center; gap: 6px;

    color: var(--ink-3);

  .health-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-4); flex-shrink: 0; }
  .health-pill.warm { background: var(--good-soft); color: var(--good); }
  .health-pill.warm .dot { background: var(--good); }
  .health-pill.warming { background: var(--warn-soft); color: var(--warn); }
  .health-pill.warming .dot { background: var(--warn); animation: pulse 1.4s infinite; }
  .health-pill.cold { background: var(--bad-soft); color: var(--bad); }
  .health-pill.cold .dot { background: var(--bad); }
  @keyframes pulse { 50% { opacity: 0.35; } }

  .btn.warm-btn { font-size: 12px; padding: 7px 11px; }
  .btn.warm-btn .spinner { display: inline-block; }

  /* Now-doing inline progress card — shows the most recent log line so the
     user always sees live activity even between stage transitions. */
  .now-doing {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 13px;

  /* Wizard cold-start hint on the Review step */
  .wizard-cold-hint {
    margin: 10px 0 0;
    padding: 10px 14px;

    border: 1px dashed var(--warn);
    border-radius: var(--radius-sm);
    color: var(--warn);
    font-size: 12.5px;
    display: flex; align-items: center; gap: 8px;
  }

  /* v3.6 — Clarification panel on wizard step 4 (review) */
  .clarify-panel {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; margin: 0 0 18px 0;
    border: 1px solid; border-radius: var(--radius);

  .clarify-panel .clarify-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
  .clarify-panel .clarify-body { flex: 1; min-width: 0; }
  .clarify-panel h4 { margin: 0 0 6px; font-size: 14px; font-weight: 600; color: var(--ink); }
  .clarify-panel p, .clarify-panel ul { margin: 0 0 8px; font-size: 13px; line-height: 1.55; color: var(--ink-2); }
  .clarify-panel ul { padding-left: 18px; }
  .clarify-panel li { margin-bottom: 4px; }
  .clarify-panel code { background: rgba(0,0,0,0.06); padding: 1px 6px; border-radius: 3px; font-size: 12px; font-family: 'Menlo', 'Consolas', monospace; }
  .clarify-panel.loading {
    background: var(--line-soft); border-color: var(--line); color: var(--ink-3);
    font-size: 13px;
  }
  .clarify-panel.ok {
    background: var(--good-soft); border-color: var(--good);
  }
  .clarify-panel.ok .clarify-icon { color: var(--good); }
  .clarify-panel.suggest {
    background: var(--warn-soft); border-color: var(--warn);
  }
  .clarify-panel.suggest .clarify-icon { color: var(--warn); }
  .clarify-panel.blocked {
    background: var(--bad-soft); border-color: var(--bad);
  }
  .clarify-panel.blocked .clarify-icon { color: var(--bad); }
  .clarify-panel textarea {
    width: 100%; min-height: 84px;
    padding: 8px 10px;
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    background: var(--panel);
    font-size: 13px; font-family: 'Menlo', 'Consolas', monospace;
    line-height: 1.5;
    resize: vertical;
  }
  .clarify-panel textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .clarify-panel .clarify-label {
    display: block; margin: 10px 0 4px;
    font-weight: 500; font-size: 12px; color: var(--ink-2);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .clarify-panel .clarify-questions {
    margin: 8px 0 4px; padding: 10px 12px;
    background: rgba(255,255,255,0.5);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .clarify-panel .clarify-questions strong { display: block; margin-bottom: 6px; color: var(--ink); }

  /* v3.9.0 — Iteration history card (Vijay's "send him history & best matches" ask) */
  .iter-card {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-left-width: 4px;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin: 14px 0;
  }
  .iter-card h3 { margin: 0 0 10px; font-size: 14px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .iter-card .rev-count { font-weight: 400; color: var(--ink-3); font-size: 12px; }
  .iter-row { padding: 10px 0; border-bottom: 1px dashed var(--line-soft); }
  .iter-row:last-child { border-bottom: none; padding-bottom: 0; }
  .iter-row:first-child { padding-top: 0; }
  .iter-rev { font-weight: 600; font-size: 13px; color: var(--accent); margin-bottom: 4px; }
  .iter-meta { font-size: 12px; color: var(--ink-3); margin-bottom: 6px; }
  .iter-low { display: inline-block; margin-left: 8px; padding: 1px 6px; background: var(--warn-soft); color: var(--warn); border-radius: 8px; font-weight: 500; font-size: 10.5px; }
  .iter-fb { background: var(--bg); padding: 6px 10px; border-left: 2px solid var(--accent); margin: 6px 0; font-size: 12.5px; color: var(--ink-2); white-space: pre-wrap; }
  .iter-names { font-size: 12.5px; color: var(--ink-2); margin: 4px 0; }
  .iter-diff { font-size: 12px; margin: 2px 0; padding-left: 12px; }
  .iter-new { color: var(--good); }
  .iter-dropped { color: var(--bad); }

  /* v3.10.0 — Chat-style input view */
  .chat-stepper { display: flex; align-items: center; gap: 0; padding: 12px 0 20px; margin-bottom: 4px; border-bottom: 1px solid var(--line-soft); }
  .parsed-card { padding: 16px 18px; border: 1px solid var(--accent); border-left-width: 4px; border-radius: var(--radius); background: var(--panel); margin-bottom: 16px; }
  .pf-grid { display: grid; grid-template-columns: 140px 1fr; gap: 10px 14px; align-items: start; }
  .pf-grid > div:nth-child(odd).pf-label {
    color: var(--ink-3); font-size: 11.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    padding-top: 6px;
  }
  .pf-grid input, .pf-grid textarea { width: 100%; padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 13px; outline: none; }
  .pf-grid input:focus, .pf-grid textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .pf-grid textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

  .q-card { padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 12px; background: var(--panel); }
  .q-card:hover { border-color: var(--ink-3); }
  .q-text { font-weight: 500; font-size: 14px; margin-bottom: 10px; color: var(--ink); }
  .q-multi-hint { color: var(--ink-3); font-size: 11.5px; margin-left: 8px; font-weight: 400; font-style: italic; }
  .q-choices { display: flex; flex-wrap: wrap; gap: 6px; }
  .q-choice {
    padding: 7px 14px; border-radius: 18px;
    border: 1px solid var(--line); background: var(--panel);
    cursor: pointer; font-size: 12.5px;
    transition: all 0.08s; user-select: none;
  }
  .q-choice:hover { border-color: var(--ink-3); }
  .q-choice.on { background: var(--accent); color: white; border-color: var(--accent); font-weight: 500; }
  .chat-link-advanced { display: block; text-align: right; margin-top: 14px; font-size: 12.5px; color: var(--ink-3); text-decoration: none; }
  .chat-link-advanced:hover { color: var(--accent); text-decoration: underline; }

  /* v3.9.0 — Verdict scoring buttons (Selected / Hold / Rejected per Saranya's grading taxonomy) */
  .verdict-cell { white-space: nowrap; min-width: 240px; }
  .verdict-btn {
    padding: 4px 9px; margin-right: 4px;
    font-size: 11.5px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--panel);
    cursor: pointer;
    transition: all 0.08s;
    user-select: none;
  }
  .verdict-btn:hover { border-color: var(--ink-3); }
  .verdict-btn:disabled { cursor: not-allowed; opacity: 0.5; }
  .verdict-btn.vselected.on { background: var(--good); border-color: var(--good); color: white; font-weight: 600; }
  .verdict-btn.vhold.on     { background: var(--warn); border-color: var(--warn); color: white; font-weight: 600; }
  .verdict-btn.vrejected.on { background: var(--bad);  border-color: var(--bad);  color: white; font-weight: 600; }
  .verdict-btn.vselected:hover:not(.on) { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .verdict-btn.vhold:hover:not(.on)     { background: var(--warn-soft); color: var(--warn); border-color: var(--warn); }
  .verdict-btn.vrejected:hover:not(.on) { background: var(--bad-soft);  color: var(--bad);  border-color: var(--bad); }
</style>

<div id="app"></div>

<script>
/* ============================================================ */
/* CONFIG                                                       */
/* ============================================================ */
const API_BASE = 'https://rjp-trainer-intake-server.onrender.com';   // Render service for the RJP trainer-intake portal
const REPO_CACHE = 'rjp_portal_repo_v2';

const DOMAIN_OPTIONS = [
  'AWS', 'Microsoft Azure', 'Google Cloud Platform', 'Salesforce',
  'Backstage.io', 'Kubernetes', 'DevOps', 'Data Science / ML',
  'Java', 'Python', 'Cybersecurity', 'SAP', 'Other (specify below)'
];
// v3.24.0 — LOCATIONS + OUTPUT_OPTIONS removed (wizard-only constants;
// chat flow asks location as a clarifying question and only ever builds .xlsx)

// v3.27.0 — search source toggles, now nested. Grouped sources expose each
// child site as its own checkbox; parent acts as select-all. Backend builds
// the OR-query string dynamically from active children (skips entire query
// family if 0 children active). Perplexity remains disabled until
// PERPLEXITY_API_KEY lands on Render.
const SOURCE_OPTIONS = [
  { key: 'linkedin', label: 'LinkedIn profiles', sub: 'site:linkedin.com/in' },
  { key: 'marketplace', label: 'Trainer marketplaces', children: [
    { key: 'urbanpro', label: 'UrbanPro', sub: 'urbanpro.com' },
    { key: 'sulekha',  label: 'Sulekha',  sub: 'sulekha.com' },
  ]},
  { key: 'youtube', label: 'YouTube tutorials', sub: 'site:youtube.com' },
  { key: 'udemy',   label: 'Udemy courses',     sub: 'site:udemy.com' },
  { key: 'blogs', label: 'Tech blogs', children: [
    { key: 'medium',   label: 'Medium',   sub: 'medium.com' },
    { key: 'devto',    label: 'dev.to',   sub: 'dev.to' },
    { key: 'hashnode', label: 'Hashnode', sub: 'hashnode.com (Indian-founded, dev-heavy)' },
    { key: 'substack', label: 'Substack', sub: 'substack.com (paid newsletters / cohorts)' },
  ]},
  { key: 'indianPlatforms', label: 'Indian training platforms', children: [
    { key: 'edureka',         label: 'Edureka',          sub: 'edureka.co' },
    { key: 'simplilearn',     label: 'Simplilearn',      sub: 'simplilearn.com' },
    { key: 'greatlearning',   label: 'Great Learning',   sub: 'greatlearning.com' },
    { key: 'upgrad',          label: 'UpGrad',           sub: 'upgrad.com' },
    { key: 'analyticsvidhya', label: 'Analytics Vidhya', sub: 'analyticsvidhya.com' },
    { key: 'whizlabs',        label: 'Whizlabs',         sub: 'whizlabs.com' },
    { key: 'kodekloud',       label: 'KodeKloud',        sub: 'kodekloud.com' },
  ]},
  { key: 'authorityDirectories', label: 'Authority directories', children: [
    { key: 'msmvp',         label: 'Microsoft MVP',          sub: 'mvp.microsoft.com' },
    { key: 'googlegde',     label: 'Google GDE',             sub: 'developers.google.com/community' },
    { key: 'awshero',       label: 'AWS Hero',               sub: 'aws.amazon.com/heroes' },
    { key: 'sftrailblazer', label: 'Salesforce Trailblazer', sub: 'trailblazer.me' },
    { key: 'cncf',          label: 'CNCF',                   sub: 'cncf.io/people' },
  ]},
  { key: 'coursePlatforms', label: 'Course platforms', children: [
    { key: 'coursera',         label: 'Coursera',          sub: 'coursera.org' },
    { key: 'pluralsight',      label: 'Pluralsight',       sub: 'pluralsight.com' },
    { key: 'linkedinlearning', label: 'LinkedIn Learning', sub: 'linkedin.com/learning' },
    { key: 'oreilly',          label: "O'Reilly",          sub: 'oreilly.com' },
  ]},
  { key: 'meetup',     label: 'Meetup organizers', sub: 'site:meetup.com' },
  { key: 'eventbrite', label: 'Eventbrite hosts',  sub: 'site:eventbrite.com' },
  { key: 'github',     label: 'GitHub edu repos',  sub: 'site:github.com' },
  { key: 'perplexity', label: 'Perplexity (Sonar Pro)', sub: 'Live-web named-trainer probe (Phase 1.2)', needsKey: true },
];
// All leaf source keys, all defaulting to ON. Grouped sources flatten to
// `${parentKey}_${childKey}` (e.g. indianPlatforms_edureka).
function defaultSourceMap() {
  const out = {};
  for (const s of SOURCE_OPTIONS) {
    if (s.children) {
      for (const c of s.children) out[`${s.key}_${c.key}`] = true;
    } else {
      out[s.key] = true;
    }
  }
  return out;
}
function sourceLeafKeys(opt) {
  return opt.children ? opt.children.map(c => `${opt.key}_${c.key}`) : [opt.key];
}

/* ============================================================ */
/* STATE                                                        */
/* ============================================================ */
let state = {
  token: 'open',  // auth removed 2026-05-01; sentinel keeps Authorization header machinery happy
  briefs: [],
  // v3.23.0 — featureRequests + persistentExclusions removed (admin tab gone)
  // v3.24.0 — view space simplified: home | chat | detail (wizard + admin gone)
  view: 'home',
  activeBriefId: null,
  liveBrief: null,
  pollTimer: null,
  defaultExclusions: [],
  // v3.2 backend health surface — drives the cold-start banner + warm-up button
  backendStatus: 'unknown',  // unknown | warming | warm | cold
  backendUptime: null,       // seconds since last server boot
  backendDirty: null,        // { briefs, featureRequests } from /healthz
  backendCheckedAt: null,    // ms timestamp
  healthTimer: null,
  // v3.26.0 — Perplexity configured-flag (mirrors /healthz perplexity.configured).
  // Drives the active/disabled state of the Perplexity source toggle in chat Step 2.
  perplexityConfigured: false,
  // v3.24.0 — clarify state was wizard-only; removed
  // v3.9.0 — candidate scoring cache. { briefId: { candidateUrl: 'selected'|'hold'|'rejected' } }
  candidateScores: {},
  // v3.18.0 — outreach tracker. Map keyed by briefId → { candidateUrl: status }.
  // Mirrors candidateScores. Status: not_contacted | emailed | called | replied
  // | scheduled | confirmed | no_response. Replaces RJP's external spreadsheet.
  candidateOutreach: {},
  outreachLoadedFor: null,
  scoresLoadedFor: null,     // briefId for which scores were last fetched (avoid re-fetching during polls)
  // v3.10.0 — chat-style input flow (replaces wizard as default for "+ New brief")
  chatStep: 1,               // 1=describe, 2=review parse, 3=clarifying questions, 4=submit
  chatInput: '',
  chatLoading: false,
  chatParsed: null,          // { title, domain, keywords[], must[], should[], mustNot[], searchMode, customExclusions[], ... }
  chatQuestions: [],         // [{ id, question, choices, multiSelect }]
  chatAnswers: {},           // { questionId: choiceId | [choiceId, ...] }
  chatOpName: '',
  chatOpEmail: '',
  chatIsTest: null,          // v3.33.0 — null = use auto-detect; explicit true/false overrides
  chatCritique: null,        // v3.34.0 — { issues, confident_rewrites } from /api/briefs/critique
  chatLoadingMessage: '',    // v3.34.0 — label for the loading meter (parse vs critique vs ask-questions)
  chatLoadingEta: 6,         // v3.34.0 — estimated seconds for current loading state

  // v3.13.0 — persistent operator identity. Hydrated on boot from localStorage
  // key 'rjp_operator'. When present, the wizard's Step 1 and the chat-flow's
  // Step 4 name+email inputs are hidden — submission auto-uses this identity.
  // Header chip shows "Submitting as <name>" with a Switch link to clear.
  operator: null,            // { name, email } or null
};

/* v3.13.0 — operator identity helpers (localStorage-backed). No real auth —
   the portal is internal-only per Gulshan, but team members each get their
   own attribution baked into the brief without re-typing every time. */
const OP_KEY = 'rjp_operator';
function loadOperator() {
  try {
    const raw = localStorage.getItem(OP_KEY);
    if (!raw) return null;
    const o = JSON.parse(raw);
    if (o && typeof o.name === 'string' && typeof o.email === 'string' && o.name.trim() && o.email.trim()) return o;
  } catch (_) {}
  return null;
}
function saveOperator(name, email) {
  const o = { name: String(name || '').trim().slice(0, 80), email: String(email || '').trim().slice(0, 120) };
  if (!o.name || !o.email) return null;
  localStorage.setItem(OP_KEY, JSON.stringify(o));
  state.operator = o;
  return o;
}
function clearOperator() {
  localStorage.removeItem(OP_KEY);

}

/* v3.14.0 — chat-flow draft auto-save. Persists the in-progress chat (text,
   parse, clarifying answers, current step) to localStorage on every state
   change, so a tab close, accidental nav, or reload doesn't lose work.
   24-hour TTL — older drafts auto-expire. Cleared on successful submit
   or explicit Discard via the "+ New brief" prompt. */
const CHAT_DRAFT_KEY = 'rjp_chat_draft';
const CHAT_DRAFT_TTL_MS = 24 * 60 * 60 * 1000;
function saveChatDraft() {
  const empty = state.chatStep === 1 && !(state.chatInput || '').trim();
  if (empty) return clearChatDraft();
  try {
    localStorage.setItem(CHAT_DRAFT_KEY, JSON.stringify({
      chatStep:      state.chatStep,
      chatInput:     state.chatInput,
      chatParsed:    state.chatParsed,
      chatQuestions: state.chatQuestions,
      chatAnswers:   state.chatAnswers,
      ts:            Date.now(),
    }));
  } catch (_) {}
}
function loadChatDraft() {
  try {
    const raw = localStorage.getItem(CHAT_DRAFT_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d || typeof d.ts !== 'number' || (Date.now() - d.ts) > CHAT_DRAFT_TTL_MS) {
      clearChatDraft();
      return null;
    }
    return d;
  } catch (_) { return null; }
}
function clearChatDraft() {
  try { localStorage.removeItem(CHAT_DRAFT_KEY); } catch (_) {}
}

/* v3.15.0 — sidebar filter state. Persisted across reloads so an operator
   who lives in "Mine + Running" doesn't have to re-set the filter every
   time. Filter is applied client-side against state.briefs. */
const SIDEBAR_FILTER_KEY = 'rjp_sidebar_filter';
function loadSidebarFilter() {
  try {
    const raw = localStorage.getItem(SIDEBAR_FILTER_KEY);
    if (!raw) return { search: '', status: 'all', mine: false };
    const f = JSON.parse(raw) || {};
    return {
      search: typeof f.search === 'string' ? f.search : '',
      status: ['all','queued','discovery','scoring','complete','failed','preview'].includes(f.status) ? f.status : 'all',
      mine:   !!f.mine,
    };
  } catch (_) { return { search: '', status: 'all', mine: false }; }
}
function saveSidebarFilter() {
  try { localStorage.setItem(SIDEBAR_FILTER_KEY, JSON.stringify(state.sidebarFilter)); } catch (_) {}
}
function applySidebarFilter(briefs) {
  const f = state.sidebarFilter || { search: '', status: 'all', mine: false, hideTests: false };
  const q = (f.search || '').trim().toLowerCase();
  const myEmail = state.operator && state.operator.email ? state.operator.email.toLowerCase() : '';
  return briefs.filter(b => {
    if (f.status !== 'all') {
      // 'discovery' chip catches in-flight statuses (discovery/scoring/queued/preview)
      if (f.status === 'discovery') {
        if (!['queued','discovery','scoring','preview','packaging'].includes(b.status)) return false;
      } else if ((b.status || 'queued') !== f.status) {
        return false;
      }
    }
    if (f.mine && myEmail) {
      const opEmail = (b.operator && b.operator.email || '').toLowerCase();
      if (opEmail !== myEmail) return false;
    }
    if (f.hideTests && b.isTest) return false;
    if (q) {
      const hay = [
        b.title, b.domain, (b.keywords || []).join(' '),
        b.id, b.operator && b.operator.name, b.operator && b.operator.email,
      ].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

/* ============================================================ */
/* API                                                          */
/* ============================================================ */
async function api(method, path, body) {
  const url = API_BASE + path;
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const opts = { method, headers };
  if (body !== undefined) opts.body = JSON.stringify(body);
  let res;
  try { res = await fetch(url, opts); }
  catch (e) { throw new Error('Cannot reach the server. Is it running? ' + e.message); }
  if (res.status === 401) { throw new Error('Authorization rejected by server.'); }
  if (!res.ok) {
    const text = await res.text();
    throw new Error('Server error (' + res.status + '): ' + text.slice(0, 200));
  }
  const ct = res.headers.get('Content-Type') || '';
  return ct.includes('application/json') ? res.json() : res;
}

async function loadBriefs() {
  try {
    const data = await api('GET', '/api/briefs');
    state.briefs = data.briefs || [];
    localStorage.setItem(REPO_CACHE, JSON.stringify(state.briefs));
  } catch (e) {
    const cached = localStorage.getItem(REPO_CACHE);
    if (cached) state.briefs = JSON.parse(cached);
    toast(e.message, 'error');
  }
}

/* ============================================================ */
/* BACKEND HEALTH (v3.2)                                        */
/* ============================================================ */
// Render free tier spins down web services after 15 min idle. The first
// request after spin-down takes ~22s to wake the dyno, init the Postgres
// pool, and warm the claude CLI subprocess. Without this code, RJP would
// see a "frozen" UI for 25s with no feedback. With this code, they see a
// banner explaining what's happening and a status pill showing live state.
//
// Three states:
//   warm     — last /healthz returned in <5s and was 200
//   warming  — /healthz is in flight, OR last response was slow (>5s)
//   cold     — /healthz failed or timed out (>35s)
//
// The "Warm up" button in the topbar fires checkBackend() on demand so
// users can pre-warm before they click "+ New brief". A 60s interval also
// re-checks automatically so the pill stays current.

async function checkBackend() {
  const start = Date.now();
  // First-ever check shows 'warming' so the pill isn't blank
  if (state.backendStatus === 'unknown') state.backendStatus = 'warming';
  renderBackendIndicators();
  try {
    const ctrl = new AbortController();
    const timeoutId = setTimeout(() => ctrl.abort(), 35000);
    const res = await fetch(API_BASE + '/healthz', { signal: ctrl.signal, headers: { 'Cache-Control': 'no-cache' } });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error('healthz HTTP ' + res.status);
    const data = await res.json();
    const elapsed = Date.now() - start;
    state.backendStatus = elapsed > 5000 ? 'warming' : 'warm';
    state.backendUptime = data.uptimeSec || null;
    state.backendDirty = data.dirty || null;
    state.backendCheckedAt = Date.now();
    // v3.26.0 — capture Perplexity configured-flag for Step 2 source toggles
    state.perplexityConfigured = !!(data.perplexity && data.perplexity.configured);
    return state.backendStatus;
  } catch (e) {
    state.backendStatus = 'cold';
    state.backendCheckedAt = Date.now();
    return 'cold';
  } finally {
    renderBackendIndicators();
  }
}

function renderBackendIndicators() {
  const pill = document.getElementById('health-pill');
  const banner = document.getElementById('cold-banner');
  if (pill) {
    pill.className = 'health-pill ' + state.backendStatus;
    const labels = {
      unknown: 'Checking…',
      warming: 'Warming up…',
      warm:    'Backend warm',
      cold:    'Backend offline',
    };
    pill.innerHTML = `<span class="dot"></span>${labels[state.backendStatus] || 'Unknown'}`;
    const dirtyNote = state.backendDirty && (state.backendDirty.briefs || state.backendDirty.featureRequests)
      ? `\n${state.backendDirty.briefs} brief(s), ${state.backendDirty.featureRequests} FR(s) pending re-persist`
      : '';
    pill.title = state.backendUptime != null
      ? `Backend uptime: ${formatDuration(state.backendUptime)}\nLast checked: ${new Date(state.backendCheckedAt).toLocaleTimeString()}${dirtyNote}\nClick "Warm up" if a submission feels slow.`
      : 'Click "Warm up" if a submission feels slow.';
  }
  if (banner) {
    if (state.backendStatus === 'cold') {
      banner.className = 'cold-banner show error';
      banner.innerHTML = '<span>⚠</span><span><strong>Backend unreachable.</strong> Render may be cold-starting (~25s) or down. Click <strong>Warm up</strong> in the top bar to retry. New submissions will queue but will fail to start until the backend is back.</span>';
    } else if (state.backendStatus === 'warming') {
      banner.className = 'cold-banner show';
      banner.innerHTML = '<span class="spinner">⟳</span><span><strong>Backend was idle and is warming up.</strong> First request usually takes 20-30s. The status pill in the top bar turns green when ready. Submissions made now will work — just slower than usual.</span>';
    } else {
      banner.className = 'cold-banner';
    }
  }
}

function startHealthLoop() {
  if (state.healthTimer) clearInterval(state.healthTimer);
  // 60s polling so the pill reflects live state without spamming the server.
  // The keep-warm GH Actions cron pings every 10 min from outside; this is for
  // in-tab freshness only.
  state.healthTimer = setInterval(checkBackend, 60 * 1000);
}

async function getBrief(id) {
  return (await api('GET', '/api/briefs/' + encodeURIComponent(id))).brief;
}

async function pollActive() {
  if (!state.activeBriefId) return;
  try {
    const b = await getBrief(state.activeBriefId);
    state.liveBrief = b;
    const ix = state.briefs.findIndex(x => x.id === b.id);
    if (ix >= 0) state.briefs[ix] = b; else state.briefs.unshift(b);
    if (state.view === 'detail') renderMain();
    renderSidebar();
    if (b.status === 'complete' || b.status === 'failed') stopPolling();
  } catch (e) { /* keep polling */ }
}
function startPolling() { stopPolling(); pollActive(); state.pollTimer = setInterval(pollActive, 2500); }
function stopPolling() { if (state.pollTimer) clearInterval(state.pollTimer); state.pollTimer = null; }

async function loadScoresForBrief(briefId, force) {
  // Idempotent — caches by scoresLoadedFor so polling re-renders don't spam /scores
  if (!force && state.scoresLoadedFor === briefId) return state.candidateScores[briefId] || {};
  state.scoresLoadedFor = briefId;
  try {
    const r = await api('GET', '/api/briefs/' + encodeURIComponent(briefId) + '/scores');
    const map = {};
    for (const s of (r.scores || [])) map[s.candidateUrl] = s.score;
    state.candidateScores[briefId] = map;
  } catch (e) {
    console.warn('loadScoresForBrief failed:', e.message);
    state.candidateScores[briefId] = state.candidateScores[briefId] || {};
  }
  return state.candidateScores[briefId];
}

async function setCandidateScore(briefId, candidateUrl, candidateName, verdict) {
  if (!candidateUrl) { toast('No LinkedIn URL on this row — can\'t score.', 'error'); return; }
  state.candidateScores[briefId] = state.candidateScores[briefId] || {};
  const prev = state.candidateScores[briefId][candidateUrl];
  state.candidateScores[briefId][candidateUrl] = verdict;
  renderMain();
  try {
    await api('POST', '/api/briefs/' + encodeURIComponent(briefId) + '/scores', {
      candidateUrl, candidateName: candidateName || '', score: verdict,
    });
    toast('Marked ' + verdict + '.', 'success');
  } catch (e) {
    if (prev) state.candidateScores[briefId][candidateUrl] = prev;
    else delete state.candidateScores[briefId][candidateUrl];
    renderMain();
    toast('Save failed: ' + e.message, 'error');
  }
}

async function clearCandidateScore(briefId, candidateUrl) {
  state.candidateScores[briefId] = state.candidateScores[briefId] || {};
  const prev = state.candidateScores[briefId][candidateUrl];
  delete state.candidateScores[briefId][candidateUrl];
  renderMain();
  try {
    await api('DELETE', '/api/briefs/' + encodeURIComponent(briefId) + '/scores?candidateUrl=' + encodeURIComponent(candidateUrl));
    toast('Score cleared.', 'success');
  } catch (e) {
    if (prev) state.candidateScores[briefId][candidateUrl] = prev;
    renderMain();
    toast('Clear failed: ' + e.message, 'error');
  }
}

    return;
  }
  state.candidateOutreach[briefId][candidateUrl] = status;
  renderMain();
  try {
    await api('POST', '/api/briefs/' + encodeURIComponent(briefId) + '/outreach', {
      candidateUrl, candidateName: candidateName || '', status,
      by: state.operator && state.operator.name ? state.operator.name : undefined,
    });
    toast('Outreach: ' + (OUTREACH_LABELS[status] || status), 'success');
  } catch (e) {
    if (prev) state.candidateOutreach[briefId][candidateUrl] = prev;
    else delete state.candidateOutreach[briefId][candidateUrl];
    renderMain(); toast('Save failed: ' + e.message, 'error');

// v3.32.0 — Input quality check.
// Runs at Step 2 (live, as user edits), Step 4 (final review), and Submit (hard guard).
// Returns { blocking, warnings }: blocking issues block submission, warnings inform.
// Designed from real client-run patterns: missing must-have, redundant keyword variants,
// and generic single-word keywords account for ~all of the lowYield runs we've seen.
function chatQualityCheck(p) {
  const blocking = [];
  const warnings = [];
  const keywords = (p.keywords || []).filter(k => String(k || '').trim());
  const must     = (p.must     || []).filter(k => String(k || '').trim());

  if (must.length === 0) {
    blocking.push({
      title: 'Please add at least one must-have skill',
      detail: 'A must-have is the single technical skill every accepted candidate must demonstrate. Without it, the system has no way to distinguish a real expert from someone who only looks the part — that has been the main reason recent runs have surfaced low-quality candidates.',
      example: 'For "Splunk Observability Trainer" briefs, set must-have to: Splunk. For "NetBrain" briefs: NetBrain. For "Salesforce" briefs: Salesforce.',
    });
  }

  if (keywords.length > 4) {
    warnings.push({
      title: `${keywords.length} keywords — consider trimming to 3 or 4`,
      detail: 'Each keyword runs its own search, which adds time and cost. 3–4 sharp keywords usually beat 6 overlapping ones.',
      example: 'If you have "X Trainer", "X Consultant", "X Expert", "X SME" — keep just "X Trainer". The ranking step already handles role variants automatically.',
    });
  }

  const GENERIC = new Set(['trainer','consultant','expert','sme','india','indian','specialist','professional','developer','engineer','instructor','teacher','coach','architect']);
  const genericMatches = keywords.filter(k => GENERIC.has(String(k || '').trim().toLowerCase()));
  if (genericMatches.length) {
    warnings.push({
      title: `Generic keyword: "${genericMatches.join('", "')}"`,
      detail: 'On its own, a single generic word matches almost any profile. The pipeline already adds "trainer" + "India" context to every search, so you don\'t need them as standalone keywords.',
      example: 'Instead of "Trainer", try "Splunk Trainer". Instead of "India", drop it — geography is enforced at filter stage.',
    });
  }

  const lowered = keywords.map(k => String(k || '').toLowerCase().trim());
  const prefixGroups = {};
  for (let i = 0; i < lowered.length; i++) {
    const tokens = lowered[i].split(/\s+/);
    if (tokens.length < 2) continue;
    const prefix = tokens.slice(0, 2).join(' ');
    if (!prefixGroups[prefix]) prefixGroups[prefix] = [];
    prefixGroups[prefix].push(keywords[i]);
  }
  Object.entries(prefixGroups).forEach(([prefix, group]) => {
    if (group.length >= 2) {
      warnings.push({
        title: `Overlapping keywords share "${prefix}"`,
        detail: `These all target the same candidate pool: ${group.map(k => '"' + k + '"').join(', ')}. They\'ll find largely the same people while burning extra search quota.`,
        example: 'Pick the strongest one — the rerank handles role variants like Trainer / Consultant / Expert.',
      });
    }
  });

  return { blocking, warnings };
}

async function chatHandleSend() {
  const text = (document.getElementById('chat-input').value || '').trim();
  if (!text || text.length < 10) { toast('Please describe in at least 10 characters.', 'error'); return; }
  state.chatInput = text;
  state.chatLoading = true;
  renderChatStep1();
  try {
    const r = await api('POST', '/api/briefs/parse', { text });
    state.chatParsed = r.parsed || {};
    // v3.26.0 — initialize source toggles to all-default-on (operator can flip in Step 2)
    if (!state.chatParsed.sources) state.chatParsed.sources = defaultSourceMap();
    saveChatDraft();  // v3.14.0 — persist parse result so reload doesn't burn a Haiku call
    // Default mode if not set
    if (!state.chatParsed.searchMode) state.chatParsed.searchMode = 'std';
    state.chatLoading = false;
    state.chatStep = 2;
    renderChat(document.getElementById('main'));
  } catch (e) {
    state.chatLoading = false;
    toast('Parse failed: ' + e.message, 'error');
    renderChatStep1();
  }
}

function renderChatStep2() {
  const p = state.chatParsed || {};
  // Suggest a domain if missing — derive from first keyword
  const suggestedDomain = p.domain || (Array.isArray(p.keywords) && p.keywords[0]) || '';
  // v3.27.0 — nested source toggles. Grouped sources expose each child site
