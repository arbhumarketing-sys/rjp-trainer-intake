<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trainer Sourcing Portal · RJP Infotek</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f7f8fa;
    --panel: #ffffff;
    --line: #e4e7eb;
    --line-soft: #eef0f3;
    --ink: #1f2937;
    --ink-2: #4b5563;
    --ink-3: #6b7280;
    --ink-4: #9ca3af;
    --accent: #1d4ed8;
    --accent-2: #1e40af;
    --accent-soft: #eef2ff;
    --good: #047857;
    --good-soft: #ecfdf5;
    --warn: #b45309;
    --warn-soft: #fffbeb;
    --bad: #b91c1c;
    --bad-soft: #fef2f2;
    --radius: 8px;
    --radius-sm: 5px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 12px rgba(15,23,42,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ============ LOGIN ============ */
  .login-shade {
    height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
  }
  .login-card {
    width: 380px;
    padding: 32px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow-md);
  }
  .login-brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 22px;
    font-weight: 600; font-size: 14px;
  }
  .login-mark {
    width: 28px; height: 28px;
    border-radius: 6px; background: var(--accent);
    color: white;
    display: grid; place-items: center;
    font-weight: 700; font-size: 12px;
  }
  .login-card h2 { font-size: 19px; font-weight: 600; margin: 0 0 4px; }
  .login-card .lead { color: var(--ink-3); font-size: 13px; margin: 0 0 22px; }

  /* ============ TOPBAR ============ */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    height: 56px; padding: 0 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 600; font-size: 14px;
  }
  .topbar-brand .login-mark { width: 24px; height: 24px; }
  .topbar-brand .sub { color: var(--ink-3); font-weight: 400; font-size: 13px; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .topbar-clock { font-size: 12px; color: var(--ink-3); margin-right: 4px; }

  /* ============ BUTTONS / INPUTS ============ */
  .btn {
    padding: 8px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: var(--panel);
    font-size: 13px; font-weight: 500;
    transition: all 0.1s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--ink-3); }
  .btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
    font-weight: 500;
  }
  .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.primary:disabled { background: var(--ink-4); border-color: var(--ink-4); cursor: not-allowed; }
  .btn.ghost { border-color: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--line-soft); }
  .btn.danger:hover { color: var(--bad); border-color: var(--bad); }
  .btn-wide { width: 100%; justify-content: center; padding: 10px; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .field label.lbl {
    font-weight: 500; font-size: 13px; color: var(--ink);
  }
  .field .hint {
    font-size: 12px; color: var(--ink-3);
    margin-top: -4px;
  }
  .field .err {
    font-size: 12px; color: var(--bad);
    display: none; margin-top: 2px;
  }
  .field.has-error .err { display: block; }
  .field.has-error input, .field.has-error select, .field.has-error textarea {
    border-color: var(--bad);
  }
  .field input, .field select, .field textarea {
    padding: 9px 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius-sm);
    font-size: 14px;
    outline: none;
    transition: border 0.08s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.55; }

  /* Chip group */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 18px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.08s;
    user-select: none;
  }
  .chip:hover { border-color: var(--ink-3); }
  .chip input { display: none; }
  .chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  /* Counter (still nice for default headcount) */
  .counter {
    display: inline-flex; align-items: center; gap: 0;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .counter button {
    width: 32px; height: 32px;
    background: var(--panel); color: var(--ink-2);
    font-size: 16px; line-height: 1;
  }
  .counter button:hover { background: var(--line-soft); }
  .counter .val {
    padding: 0 14px; min-width: 50px;
    font-weight: 600; font-size: 15px;
    text-align: center;
  }

  /* ============ MAIN LAYOUT (in-app) ============ */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 56px);
  }
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--panel);
    padding: 16px 12px;
    overflow-y: auto;
  }
  .sidebar-section {
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 4px 8px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .sidebar-section .count {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; font-weight: 500; color: var(--ink-3);
  }
  .brief-list { display: flex; flex-direction: column; gap: 2px; }
  .brief-item {
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.08s;
    display: flex; flex-direction: column; gap: 4px;
  }
  .brief-item:hover { background: var(--line-soft); }
  .brief-item.active { background: var(--accent-soft); }
  .brief-item-title {
    font-size: 13.5px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .brief-item-meta {
    display: flex; gap: 8px; align-items: center; font-size: 11.5px;
    color: var(--ink-3);
  }

  .status-pill {
    font-size: 10.5px; font-weight: 600;
    padding: 1px 8px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .status-queued    { background: var(--line-soft); color: var(--ink-3); }
  .status-running, .status-scoring, .status-building   { background: var(--accent-soft); color: var(--accent); }
  .status-complete  { background: var(--good-soft); color: var(--good); }
  .status-failed    { background: var(--bad-soft); color: var(--bad); }

  /* main canvas */
  .main {
    overflow-y: auto;
    padding: 32px 28px;
  }
  .center {
    max-width: 720px;
    margin: 0 auto;
  }

  /* ============ STEP HEADER ============ */
  .page-head { margin-bottom: 24px; }
  .page-head h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  .page-head .sub { color: var(--ink-3); font-size: 13.5px; }

  .stepper {
    display: flex; align-items: center; gap: 0;
    padding: 16px 0 24px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--line-soft);
  }
  .stepper-item {
    display: flex; align-items: center; gap: 8px;
    flex: 1;
  }
  .stepper-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    color: var(--ink-3); background: var(--panel);
    font-size: 12px; font-weight: 600;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .stepper-label { font-size: 13px; color: var(--ink-3); }
  .stepper-bar {
    flex: 1; height: 1px; background: var(--line);
  }
  .stepper-item.done .stepper-num { background: var(--good); border-color: var(--good); color: white; }
  .stepper-item.done .stepper-label { color: var(--good); }
  .stepper-item.active .stepper-num { background: var(--accent); border-color: var(--accent); color: white; }
  .stepper-item.active .stepper-label { color: var(--ink); font-weight: 500; }

  /* ============ FORM PANEL ============ */
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 24px;
    margin-bottom: 16px;
  }
  .panel h3 {
    font-size: 14px; font-weight: 600; margin: 0 0 4px;
    color: var(--ink);
  }
  .panel .panel-sub {
    color: var(--ink-3); font-size: 12.5px; margin-bottom: 18px;
  }
  .panel-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4px; padding-top: 18px; border-top: 1px solid var(--line-soft);
  }

  /* roles list */
  .roles-grid {
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 8px;
  }
  .roles-head, .role-row {
    display: grid;
    grid-template-columns: 32px 1.4fr 1fr 1fr 80px 32px;
    gap: 0;
    align-items: center;
  }
  .roles-head {
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .roles-head > div, .role-row > div {
    padding: 8px 10px;
    border-right: 1px solid var(--line-soft);
    min-width: 0;
  }
  .roles-head > div:last-child, .role-row > div:last-child { border-right: none; }
  .role-row { border-bottom: 1px solid var(--line-soft); font-size: 13px; }
  .role-row:last-child { border-bottom: none; }
  .role-row input {
    width: 100%; border: none; outline: none; background: transparent;
    padding: 4px 0; font-size: 13px;
  }
  .role-row input:focus { color: var(--ink); }
  .role-num { color: var(--ink-4); font-family: ui-monospace, monospace; font-size: 12px; text-align: center; }
  .role-del {
    color: var(--ink-4); border-radius: 3px;
    width: 22px; height: 22px;
    display: grid; place-items: center;
    margin: 0 auto;
  }
  .role-del:hover { background: var(--bad-soft); color: var(--bad); }

  /* ============ REVIEW ============ */
  .review-grid {
    display: grid; grid-template-columns: 140px 1fr;
    gap: 8px 18px; padding: 4px 0;
    font-size: 13.5px;
  }
  .review-grid > div:nth-child(odd) {
    color: var(--ink-3); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
    padding-top: 4px;
  }

  /* ============ PROGRESS BOARD ============ */
  .stages {
    display: flex; flex-direction: column; gap: 0;
  }
  .stage {
    display: grid;
    grid-template-columns: 36px 1fr 110px;
    gap: 14px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .stage:last-child { border-bottom: none; }
  .stage-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--panel); color: var(--ink-4);
    font-size: 12px; font-weight: 600;
    display: grid; place-items: center;
  }
  .stage.done .stage-num { background: var(--good); border-color: var(--good); color: white; }
  .stage.active .stage-num { background: var(--accent); border-color: var(--accent); color: white; }
  .stage-info { display: flex; flex-direction: column; gap: 2px; }
  .stage-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .stage-sub { font-size: 12px; color: var(--ink-3); }
  .stage-status {
    text-align: right;
    font-size: 11px; font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .stage.done .stage-status { color: var(--good); }
  .stage.active .stage-status { color: var(--accent); }

  .log {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11.5px;
    max-height: 220px; overflow-y: auto;
    color: var(--ink-2); line-height: 1.6;
    white-space: pre-wrap;
  }
  .log .ts { color: var(--ink-4); }
  .log .err { color: var(--bad); }

  .download-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px;
    background: var(--good-soft);
    border: 1px solid var(--good);
    border-radius: var(--radius);
    color: var(--good); font-weight: 500; font-size: 14px;
  }
  .download-bar .btn { margin-left: auto; }

  .meta-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 22px;
    padding: 14px 18px;
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .meta-cell { display: flex; flex-direction: column; gap: 2px; }
  .meta-label {
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .meta-val { font-size: 13.5px; color: var(--ink); }

  /* ============ TOAST ============ */
  .toast {
    position: fixed; bottom: 18px; right: 18px;
    background: var(--ink); color: white;
    padding: 10px 14px; border-radius: var(--radius);
    font-size: 13px; box-shadow: var(--shadow-md);
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--bad); }
  .toast.success { background: var(--good); }

  .empty-side { color: var(--ink-3); font-size: 12.5px; padding: 12px 8px; line-height: 1.55; }

  /* ============ v3.1 widgets ============ */
  .mode-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; }
  .mode-toggle button { padding: 7px 14px; font-size: 12px; font-weight: 500; color: var(--ink-3); background: var(--panel); border-right: 1px solid var(--line); }
  .mode-toggle button:last-child { border-right: none; }
  .mode-toggle button.on { background: var(--accent); color: white; }

  .panel-collapsible { border-top: 1px solid var(--line-soft); margin-top: 14px; padding-top: 12px; }
  .panel-collapsible-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 4px 0; }
  .panel-collapsible-head h4 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-3); font-weight: 600; }
  .panel-collapsible-body { display: none; padding-top: 10px; }
  .panel-collapsible.open .panel-collapsible-body { display: block; }
  .panel-collapsible.open .panel-collapsible-head h4 { color: var(--accent); }

  .advanced-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; }
  .source-toggles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

  .tat-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 12.5px; }
  .tat-bar strong { color: var(--ink); }
  .tat-bar .tat-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .tat-bar.over .tat-dot { background: var(--bad); }
  .tat-bar.done .tat-dot { background: var(--good); }

  .sample-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 8px; }
  .sample-table th, .sample-table td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  .sample-table th { background: var(--bg); font-weight: 600; color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  .sample-table tr:hover td { background: var(--bg); }
  .sample-table .signal-pill { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em; }
  .signal-TRAINER_EXPLICIT, .signal-FREELANCE_TRAINER { background: var(--good-soft); color: var(--good); }
  .signal-TRAINER_IMPLIED, .signal-INSTITUTE { background: var(--accent-soft); color: var(--accent); }
  .signal-PRACTITIONER { background: var(--warn-soft); color: var(--warn); }
  .signal-SPEAKER_ONLY, .signal-BIG_FIRM, .signal-NON_INDIA, .signal-MUSTNOT_HIT, .signal-NOISE { background: var(--bad-soft); color: var(--bad); }

  .feedback-form textarea { width: 100%; min-height: 80px; }
  .frq-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .frq-item { padding: 10px 12px; border: 1px solid var(--line-soft); border-radius: var(--radius-sm); display: grid; grid-template-columns: 1fr auto; gap: 6px 14px; font-size: 12.5px; }
  .frq-item .frq-meta { color: var(--ink-3); font-size: 11.5px; }
  .frq-actions { display: flex; gap: 6px; }
  .frq-actions .btn { padding: 4px 10px; font-size: 11.5px; }
  .frq-status-pending { color: var(--warn); }
  .frq-status-approved { color: var(--good); }
  .frq-status-rejected { color: var(--bad); }
  .frq-status-shipped { color: var(--accent); }

  .quick-intake { display: flex; gap: 8px; margin-top: 14px; }
  .quick-intake input { flex: 1; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stepper-label { display: none; }
    .meta-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================ */
/* CONFIG                                                       */
/* ============================================================ */
const API_BASE = 'https://rjp-trainer-intake-server.onrender.com';   // Render service for the RJP trainer-intake portal
const REPO_CACHE = 'rjp_portal_repo_v2';

const DOMAIN_OPTIONS = [
  'AWS', 'Microsoft Azure', 'Google Cloud Platform', 'Salesforce',
  'Backstage.io', 'Kubernetes', 'DevOps', 'Data Science / ML',
  'Java', 'Python', 'Cybersecurity', 'SAP', 'Other (specify below)'
];
const LOCATIONS = ['All India', 'Bangalore', 'Mumbai', 'Delhi / NCR', 'Hyderabad', 'Pune', 'Chennai', 'Remote OK'];
const OUTPUT_OPTIONS = [
  { v: 'xlsx',  l: 'Excel (.xlsx)',  d: 'Default. Best for review and editing.' },
  { v: 'sheet', l: 'Google Sheet',   d: 'Shared link, real-time collaboration.' },
  { v: 'pdf',   l: 'PDF',            d: 'Read-only, easy to share externally.' },
];

/* ============================================================ */
/* STATE                                                        */
/* ============================================================ */
let state = {
  token: 'open',  // auth removed 2026-05-01; sentinel keeps Authorization header machinery happy
  briefs: [],
  featureRequests: [],
  view: 'home',         // home | new | detail | admin
  step: 1,              // 1..4 inside new-brief flow
  activeBriefId: null,
  liveBrief: null,
  pollTimer: null,
  draft: defaultDraft(),
  defaultExclusions: [],
};
function defaultDraft() {
  return {
    operatorName: '', operatorEmail: '',
    domain: '', customDomain: '',
    keywords: '',                       // v3.1 — multi-keyword (one per line)
    searchMode: 'std',                  // std | niche
    roles: [{ title: '', skill: '', bucket: '', count: 5 }],
    location: 'All India',
    must: '',                           // v3.1 — boolean must-include
    should: '',                         // v3.1 — boolean should-include
    mustNot: '',                        // v3.1 — boolean must-NOT-include
    clientCompany: '',                  // v3.1 — exclusion: client itself
    clientPrincipal: '',                // v3.1 — exclusion: their existing principal (e.g. HCL)
    customExclusions: '',               // v3.1 — extra companies, one per line
    advancedOpen: false,
    advanced: { queryDepth: 12, sources: { linkedin: true, urbanpro: true, youtube: true, udemy: true, blogs: true } },
    steering: '',
    outputFormat: 'xlsx',
    deadline: '',
    quickIntake: '',                    // v3.1 — free-text one-liner intake
  };
}

/* ============================================================ */
/* API                                                          */
/* ============================================================ */
async function api(method, path, body) {
  const url = API_BASE + path;
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const opts = { method, headers };
  if (body !== undefined) opts.body = JSON.stringify(body);
  let res;
  try { res = await fetch(url, opts); }
  catch (e) { throw new Error('Cannot reach the server. Is it running? ' + e.message); }
  if (res.status === 401) { throw new Error('Authorization rejected by server.'); }
  if (!res.ok) {
    const text = await res.text();
    throw new Error('Server error (' + res.status + '): ' + text.slice(0, 200));
  }
  const ct = res.headers.get('Content-Type') || '';
  return ct.includes('application/json') ? res.json() : res;
}

async function loadBriefs() {
  try {
    const data = await api('GET', '/api/briefs');
    state.briefs = data.briefs || [];
    localStorage.setItem(REPO_CACHE, JSON.stringify(state.briefs));
  } catch (e) {
    const cached = localStorage.getItem(REPO_CACHE);
    if (cached) state.briefs = JSON.parse(cached);
    toast(e.message, 'error');
  }
}

async function getBrief(id) {
  return (await api('GET', '/api/briefs/' + encodeURIComponent(id))).brief;
}

async function pollActive() {
  if (!state.activeBriefId) return;
  try {
    const b = await getBrief(state.activeBriefId);
    state.liveBrief = b;
    const ix = state.briefs.findIndex(x => x.id === b.id);
    if (ix >= 0) state.briefs[ix] = b; else state.briefs.unshift(b);
    if (state.view === 'detail') renderMain();
    renderSidebar();
    if (b.status === 'complete' || b.status === 'failed') stopPolling();
  } catch (e) { /* keep polling */ }
}
function startPolling() { stopPolling(); pollActive(); state.pollTimer = setInterval(pollActive, 2500); }
function stopPolling() { if (state.pollTimer) clearInterval(state.pollTimer); state.pollTimer = null; }

function renderWizard(m) {
  const labels = ['Operator', 'Domain & roles', 'Location & specifics', 'Review'];
  const stepEls = labels.map((lbl, i) => {
    const n = i + 1;
    const cls = n === state.step ? 'active' : (n < state.step ? 'done' : '');
    return `
      <div class="stepper-item ${cls}">
        <div class="stepper-num">${cls === 'done' ? '✓' : n}</div>
        <div class="stepper-label">${lbl}</div>
      </div>
      ${n < labels.length ? '<div class="stepper-bar"></div>' : ''}
    `;
  }).join('');

  m.innerHTML = `
    <div class="center">
      <div class="page-head">
        <h1>New sourcing brief</h1>
        <div class="sub">Fill in what you need. The pipeline runs automatically — no waiting on email approvals.</div>
      </div>
      <div class="stepper">${stepEls}</div>
      <div id="wizard-body"></div>
    </div>
  `;
  if (state.step === 1) renderStep1();
  else if (state.step === 2) renderStep2();
  else if (state.step === 3) renderStep3();
  else if (state.step === 4) renderStep4();
}

function navButtons(canNext, nextLabel) {

    </div>
  `;
}

  const back = document.getElementById('btn-back');

}

        <input id="f-client" value="${esc(d.clientCompany)}" placeholder="e.g. ClientX Pvt Ltd" />
      </div>

      <div class="field">
        <label class="lbl">Client's existing principal (also excluded)</label>
        <div class="hint">If the client is currently served by HCL or another principal partner, exclude that too. Distinct from "must NOT" above.</div>
        <input id="f-principal" value="${esc(d.clientPrincipal)}" placeholder="e.g. HCL Technologies" />
      </div>

      <div class="field">
        <label class="lbl">Custom company exclusions <span style="color:var(--ink-3);font-weight:400;font-size:11.5px;">— one per line, on top of the default big-firm list</span></label>
        <textarea id="f-customex" rows="3" placeholder="e.g.&#10;InfraCloud Technologies&#10;Some other firm already engaged">${esc(d.customExclusions)}</textarea>
      </div>

      <div class="field">
        <label class="lbl">Specific direction (free text, optional)</label>
        <div class="hint">Anything you want done differently — what to prioritise, how to organise output. Searcher reads this when reviewing.</div>
        <textarea id="f-steering" rows="4" placeholder="Examples:&#10;• Prioritise OmniStudio over generic admin&#10;• Sort by years of experience descending&#10;• Skip InfraCloud — already engaged">${esc(d.steering)}</textarea>
      </div>

      <div class="field">
        <label class="lbl">Output format</label>
        <div class="chip-row">
          ${OUTPUT_OPTIONS.map(o => `<label class="chip ${d.outputFormat === o.v ? 'on' : ''}" title="${esc(o.d)}">
            <input type="radio" name="output" value="${esc(o.v)}" ${d.outputFormat === o.v ? 'checked' : ''}> ${esc(o.l)}
          </label>`).join('')}
        </div>
      </div>

      <div class="field">
        <label class="lbl">Deadline (optional)</label>
        <input id="f-deadline" type="date" value="${esc(d.deadline)}" />
      </div>

      <!-- Advanced searcher panel -->
      <div class="panel-collapsible ${d.advancedOpen ? 'open' : ''}" id="adv-panel">
        <div class="panel-collapsible-head" id="adv-head">
          <h4>Advanced search settings</h4>
          <span style="color:var(--ink-3);font-size:11px;">${d.advancedOpen ? 'Hide' : 'Show'}</span>
        </div>
        <div class="panel-collapsible-body">
          <div class="advanced-grid">
            <div class="field" style="margin:0;">
              <label class="lbl">Query depth (1–25)</label>
              <input id="adv-depth" type="number" min="1" max="25" value="${esc(adv.queryDepth || (d.searchMode === 'niche' ? 20 : 12))}" />
            </div>
            <div class="field" style="margin:0;">
              <label class="lbl">Source toggles</label>
              <div class="source-toggles">
                ${['linkedin', 'urbanpro', 'youtube', 'udemy', 'blogs'].map(s => `
                  <label class="chip ${sources[s] ? 'on' : ''}"><input type="checkbox" data-src="${s}" ${sources[s] ? 'checked' : ''}> ${s}</label>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>

      ${navButtons(true)}
    </div>
  `;
  wireNav();
  document.querySelectorAll('#loc-chips .chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('#loc-chips .chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
      state.draft.location = c.querySelector('input').value;
    });
  });
  document.querySelectorAll('.chip input[name="output"]').forEach(inp => {
    inp.addEventListener('change', e => {
      document.querySelectorAll('.chip input[name="output"]').forEach(x => x.closest('.chip').classList.remove('on'));
      e.target.closest('.chip').classList.add('on');
      state.draft.outputFormat = e.target.value;
    });
  });
  // Advanced panel toggle
  document.getElementById('adv-head').addEventListener('click', () => {
    state.draft.advancedOpen = !state.draft.advancedOpen;
    document.getElementById('adv-panel').classList.toggle('open', state.draft.advancedOpen);
  });
  document.querySelectorAll('.source-toggles .chip').forEach(c => {
    c.addEventListener('click', e => {
      const cb = c.querySelector('input');
      // small delay for native checkbox toggle
      setTimeout(() => {
        c.classList.toggle('on', cb.checked);
        state.draft.advanced.sources = state.draft.advanced.sources || {};
        state.draft.advanced.sources[cb.dataset.src] = cb.checked;
      }, 0);
    });
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    state.draft.must = document.getElementById('f-must').value;
    state.draft.should = document.getElementById('f-should').value;
    state.draft.mustNot = document.getElementById('f-mustnot').value;
    state.draft.clientCompany = document.getElementById('f-client').value.trim();
    state.draft.clientPrincipal = document.getElementById('f-principal').value.trim();
    state.draft.customExclusions = document.getElementById('f-customex').value;
    state.draft.steering = document.getElementById('f-steering').value;
    state.draft.deadline = document.getElementById('f-deadline').value;
    state.draft.advanced.queryDepth = parseInt(document.getElementById('adv-depth').value, 10) || 12;
    state.step = 4;
    renderWizard(document.getElementById('main'));
  });
}

/* Step 4 — review + preview + submit */
function renderStep4() {
  const d = state.draft;
  const totalCount = d.roles.reduce((a, r) => a + (r.count || 0), 0);
  const domainShown = d.domain.startsWith('Other') ? (d.customDomain || 'Other (unspecified)') : d.domain;
  const kwLines = (d.keywords || '').split('\n').map(s => s.trim()).filter(Boolean);
  const fieldList = (s) => s ? esc(s).replace(/\n/g, '<br/>') : '—';

  document.getElementById('wizard-body').innerHTML = `
    <div class="panel">
      <h3>Review, preview, submit</h3>
      <div class="panel-sub">Run a 60-second pre-flight to see 5 sample profiles before committing the full pipeline. Then submit.</div>

      <div class="review-grid">
        <div>Operator</div><div>${esc(d.operatorName)} · ${esc(d.operatorEmail)}</div>
        <div>Mode</div><div>${d.searchMode === 'niche' ? 'Niche' : 'Standard'}</div>
        <div>Domain</div><div>${esc(domainShown)}</div>
        <div>Keywords</div><div>${kwLines.length ? kwLines.map(k => esc(k)).join('<br/>') : '— (using roles only)'}</div>
        <div>Roles</div><div>${d.roles.length ? d.roles.map((r, i) => `${i + 1}. ${esc(r.title)} (×${r.count}${r.skill ? ' · ' + esc(r.skill) : ''}${r.bucket ? ' · ' + esc(r.bucket) : ''})`).join('<br/>') : '—'}</div>
        <div>Total headcount</div><div>${totalCount}</div>
        <div>Location</div><div>${esc(d.location)}</div>
        <div>Must include</div><div>${fieldList(d.must)}</div>
        <div>Should include</div><div>${fieldList(d.should)}</div>
        <div>Must NOT include</div><div>${fieldList(d.mustNot)}</div>
        <div>Client (excluded)</div><div>${esc(d.clientCompany) || '—'}</div>
        <div>Client principal (excluded)</div><div>${esc(d.clientPrincipal) || '—'}</div>
        <div>Custom exclusions</div><div>${fieldList(d.customExclusions)}</div>
        <div>Default exclusions</div><div style="color:var(--ink-3);font-size:12px;">Tech Mahindra, Cognizant, Wipro, HCL, Infosys, TCS, Accenture, Capgemini, Mindtree, LTIMindtree, Mphasis, IBM India, Oracle India</div>
        <div>Specific direction</div><div>${fieldList(d.steering)}</div>
        <div>Output</div><div>${esc((OUTPUT_OPTIONS.find(o => o.v === d.outputFormat) || {}).l || d.outputFormat)}</div>
        <div>Deadline</div><div>${esc(d.deadline) || '—'}</div>
      </div>

      <div class="panel-actions">
        <button class="btn" id="btn-back">← Back</button>
        <button class="btn" id="btn-preview">Run pre-flight (1 query, 5 samples)</button>
        <button class="btn primary" id="btn-submit">Submit & start full sourcing</button>
      </div>
    </div>
  `;
  wireNav();
  document.getElementById('btn-submit').addEventListener('click', () => submitWizard(false));
  document.getElementById('btn-preview').addEventListener('click', () => submitWizard(true));
}

async function submitWizard(preview) {
  const d = state.draft;
  const btnSubmit = document.getElementById('btn-submit');
  const btnPreview = document.getElementById('btn-preview');
  if (btnSubmit) btnSubmit.disabled = true;
  if (btnPreview) btnPreview.disabled = true;
  if (preview && btnPreview) btnPreview.textContent = 'Running pre-flight…';
  if (!preview && btnSubmit) btnSubmit.textContent = 'Submitting…';
  try {
    const titleParts = [];
    if (d.roles.length && d.roles[0].title) titleParts.push(d.roles.map(r => r.title).filter(Boolean).slice(0, 2).join(' + '));
    titleParts.push(d.domain.startsWith('Other') ? d.customDomain : d.domain);
    const title = titleParts.filter(Boolean).join(' — ') + (d.searchMode === 'niche' ? ' [Niche]' : '');

    const payload = {
      title,
      domain: d.domain.startsWith('Other') ? d.customDomain : d.domain,
      geo: d.location,
      deadline: d.deadline,
      outputFormat: d.outputFormat,
      roles: d.roles,
      keywords: d.keywords,
      must: d.must,
      should: d.should,
      mustNot: d.mustNot,
      clientCompany: d.clientCompany,
      clientPrincipal: d.clientPrincipal,
      customExclusions: d.customExclusions,
      searchMode: d.searchMode,
      advanced: d.advanced,
      steering: d.steering,
      operator: { name: d.operatorName, email: d.operatorEmail },
    };
    const r = await api('POST', '/api/briefs', payload);
    if (preview) {
      // Trigger preview run on the same brief
      await api('POST', '/api/briefs/' + encodeURIComponent(r.brief.id) + '/preview');
    }
    await loadBriefs();
    state.activeBriefId = r.brief.id;
    state.view = 'detail';
    state.step = 1; state.draft = defaultDraft();
    startPolling();
    renderMain(); renderSidebar();
    toast(preview ? 'Pre-flight running — 5 samples coming.' : 'Brief submitted — full pipeline running.', 'success');
  } catch (e) {
    toast(e.message, 'error');
    if (btnSubmit) { btnSubmit.disabled = false; btnSubmit.textContent = 'Submit & start full sourcing'; }
    if (btnPreview) { btnPreview.disabled = false; btnPreview.textContent = 'Run pre-flight (1 query, 5 samples)'; }
  }
}

/* ============================================================ */
/* DETAIL                                                       */
/* ============================================================ */
function renderDetail(m) {
  const b = state.liveBrief && state.liveBrief.id === state.activeBriefId
    ? state.liveBrief
    : state.briefs.find(x => x.id === state.activeBriefId);
  if (!b) {
    m.innerHTML = '<div class="center"><div class="page-head"><h1>Loading…</h1></div></div>';
    return;
  }
  const status = b.status || 'queued';
  // v3.1 stage map. Engine emits: queued → discovery → scoring → packaging → complete.
  // Plus: preview / preview_ready for pre-flight.
  const stages = [
    { keys: ['queued'],                       name: 'Queued',      sub: 'Brief accepted' },
    { keys: ['discovery', 'preview'],          name: 'Discovery',   sub: 'Claude L1 → Apify Google → LinkedIn enrichment' },
    { keys: ['scoring'],                       name: 'Scoring',     sub: 'Speaker-aware classifier + reason-traceable accept/reject' },
    { keys: ['packaging'],                     name: 'Packaging',   sub: 'Building Excel with Candidates + Rejected (audit) tabs' },
    { keys: ['complete', 'preview_ready'],     name: 'Done',        sub: 'Output ready' },
  ];
  const ix = stages.findIndex(s => s.keys.includes(status));

  const counts = b.counts || {};
  const meta = (s) => {
    if (s.keys.includes('discovery') && counts.discovered) return counts.discovered + ' discovered';
    if (s.keys.includes('scoring') && (counts.accepted || counts.rejected)) return (counts.accepted || 0) + ' accepted / ' + (counts.rejected || 0) + ' rejected';
    if (s.keys.includes('packaging') && counts.accepted) return counts.accepted + ' rows';
    if (s.keys.includes('complete') && b.outputFile) return 'file ready';
    return '';
  };

  // TAT widget
  const tatTarget = b.tatTarget || (b.mode === 'niche' ? 720 : 480);
  const tatElapsed = b.totalElapsed
    ? parseFloat(b.totalElapsed)
    : (b.createdAt ? Math.round((Date.now() - new Date(b.createdAt).getTime()) / 1000) : 0);
  const isComplete = status === 'complete' || status === 'preview_ready';
  const isOver = !isComplete && tatElapsed > tatTarget;
  const tatHTML = `
    <div class="tat-bar ${isComplete ? 'done' : (isOver ? 'over' : '')}">
      <span class="tat-dot"></span>
      <span><strong>${isComplete ? 'TAT' : 'TAT — live'}:</strong> ${formatDuration(tatElapsed)} ${isComplete ? '' : ' / ' + formatDuration(tatTarget) + ' target'} ${b.mode === 'niche' ? '(Niche)' : '(Standard)'} </span>
      ${(b.timings || []).length ? '<span style="margin-left:auto;color:var(--ink-3);font-size:11.5px;">Stages: ' + b.timings.map(t => esc(t.stage) + ' ' + esc(t.elapsed) + 's').join(' · ') + '</span>' : ''}
    </div>
  `;

  const downloadHTML = (status === 'complete')
    ? `<div class="download-bar">
         <span>✓ Output ready · ${counts.accepted || '?'} accepted, ${counts.rejected || '?'} rejected (audit tab)</span>
         <a class="btn primary" href="${API_BASE}/api/briefs/${encodeURIComponent(b.id)}/output?token=${encodeURIComponent(state.token)}" download>Download Excel</a>
       </div>`
    : (status === 'preview_ready')
      ? `<div class="download-bar" style="background:var(--accent-soft);color:var(--accent);border-color:var(--accent);">
           <span>✓ Pre-flight done in ${esc(b.previewElapsed || '?')}s — review the 5 samples below, then run full pipeline if it looks right.</span>
           <button class="btn primary" id="btn-run-full" style="margin-left:auto;">Run full pipeline</button>
         </div>`
    : (status === 'failed')
      ? `<div class="download-bar" style="background:var(--bad-soft);color:var(--bad);border-color:var(--bad);">
           <span>✗ Pipeline stopped: ${esc(b.error || 'unknown error')}</span>
           <button class="btn" id="btn-retry" style="margin-left:auto;">Retry</button>
         </div>`
      : '';

  // Sample tables (after preview or completion)
  const sample = b.previewSample || b.acceptedSample || [];
  const rejSample = b.previewRejected || b.rejectedSample || [];

  const sampleTableHTML = (rows, mode) => rows.length ? `
    <table class="sample-table">
      <thead><tr>
        ${mode === 'accept' ? '<th>#</th><th>Score</th>' : '<th>#</th>'}
        <th>Title / headline</th>
        <th>Signal</th>
        <th>${mode === 'accept' ? 'Why accepted' : 'Why rejected'}</th>
        <th>Source</th>
      </tr></thead>
      <tbody>
        ${rows.map((c, i) => `
          <tr>
            ${mode === 'accept' ? `<td>${i + 1}</td><td><strong>${c.score || 0}</strong></td>` : `<td>${i + 1}</td>`}
            <td><div style="font-weight:500;">${esc((c.title || '').slice(0, 80))}</div><div style="color:var(--ink-3);font-size:11.5px;">${esc((c.text || '').slice(0, 140))}…</div></td>
            <td><span class="signal-pill signal-${esc(c.signal || '')}">${esc((c.signal || '').replace(/_/g, ' '))}</span></td>
            <td style="color:var(--ink-2);font-size:12.5px;">${esc(c.decision_reason || c.reason || '')}</td>
            <td>${c.url ? `<a href="${esc(c.url)}" target="_blank" rel="noopener">link</a>` : '—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>` : '<div class="hint">None.</div>';

  const exclusionList = [];
  if (b.clientCompany) exclusionList.push('client: ' + b.clientCompany);
  if (b.clientPrincipal) exclusionList.push('principal: ' + b.clientPrincipal);
  if (Array.isArray(b.customExclusions)) exclusionList.push(...b.customExclusions);

  m.innerHTML = `
    <div class="center">
      <div class="page-head">
        <h1>${esc(b.title || '(untitled brief)')}</h1>
        <div class="sub">Submitted ${b.createdAt ? new Date(b.createdAt).toLocaleString('en-IN') : 'just now'} · ID <span style="font-family:monospace;">${esc(b.id)}</span></div>
      </div>

      ${tatHTML}

      <div class="meta-grid">
        <div class="meta-cell"><span class="meta-label">Mode</span><span class="meta-val">${b.mode === 'niche' ? 'Niche' : 'Standard'}</span></div>
        <div class="meta-cell"><span class="meta-label">Domain</span><span class="meta-val">${esc(b.domain || '—')}</span></div>
        <div class="meta-cell"><span class="meta-label">Keywords</span><span class="meta-val">${(b.keywords || []).length || (b.roles || []).length}</span></div>
        <div class="meta-cell"><span class="meta-label">Discovered</span><span class="meta-val">${counts.discovered || 0}</span></div>
        <div class="meta-cell"><span class="meta-label">Accepted</span><span class="meta-val" style="color:var(--good);">${counts.accepted || 0}</span></div>
        <div class="meta-cell"><span class="meta-label">Rejected</span><span class="meta-val" style="color:var(--bad);">${counts.rejected || 0}</span></div>
        <div class="meta-cell"><span class="meta-label">Status</span><span class="meta-val"><span class="status-pill status-${status}">${status}</span></span></div>
        <div class="meta-cell"><span class="meta-label">Exclusions</span><span class="meta-val" style="font-size:11.5px;">${exclusionList.length ? esc(exclusionList.slice(0, 3).join(', ')) + (exclusionList.length > 3 ? '…' : '') : 'default big-firm only'}</span></div>
      </div>

      <div class="panel">
        <h3>Pipeline progress</h3>
        <div class="panel-sub">${isComplete ? 'Done.' : (status === 'failed' ? 'Stopped on error.' : 'Live — refreshes every 2.5 seconds.')}</div>
        <div class="stages">
          ${stages.map((s, i) => {
            const cls = (status === 'failed' && i === Math.max(0, ix)) ? 'active' : (i < ix ? 'done' : (i === ix ? 'active' : ''));
            const statusLabel = i < ix ? 'DONE' : (i === ix ? (status === 'failed' ? 'FAILED' : 'IN PROGRESS') : 'PENDING');
            return `<div class="stage ${cls}">
              <div class="stage-num">${i < ix ? '✓' : i + 1}</div>
              <div class="stage-info">
                <span class="stage-name">${s.name}</span>
                <span class="stage-sub">${s.sub}${meta(s) ? ' · ' + meta(s) : ''}</span>
              </div>
              <div class="stage-status">${statusLabel}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="log">${(b.log || []).map(l =>
          `<div><span class="ts">${esc((l.ts || '').slice(11, 19))}</span> <span class="${l.kind === 'err' ? 'err' : (l.kind === 'warn' ? 'err' : '')}">${esc(l.msg || '')}</span></div>`
        ).join('') || '<div><span class="ts">--:--:--</span> Waiting for first event…</div>'}</div>
      </div>

      ${downloadHTML}

      ${(sample.length || rejSample.length) ? `
        <div class="panel" style="margin-top:14px;">
          <h3>Top accepted (sample)</h3>
          <div class="panel-sub">First ${Math.min(sample.length, 10)} of ${counts.accepted || sample.length}. Full list in the Excel.</div>
          ${sampleTableHTML(sample.slice(0, 10), 'accept')}
        </div>

        ${rejSample.length ? `<div class="panel" style="margin-top:14px;">
          <h3>Rejected (audit sample)</h3>
          <div class="panel-sub">First ${Math.min(rejSample.length, 10)} rejections with the reason — the "verifiable conclusion" audit requirement. Full audit in the Excel "Rejected" tab.</div>
          ${sampleTableHTML(rejSample.slice(0, 10), 'reject')}
        </div>` : ''}
      ` : ''}

      ${isComplete ? `
        <div class="panel feedback-form" style="margin-top:14px;">
          <h3>Feedback on this run</h3>
          <div class="panel-sub">Form 1 — say what was off. The pipeline re-runs with your feedback applied as steering. Form 2 — feature suggestions go into a queue for Gulshan to review (no auto-build).</div>

          <div class="field">
            <label class="lbl">Form 1 — feedback for re-run</label>
            <textarea id="f-feedback" placeholder="e.g. Too many DBA generalists. Filter for Aurora-specific. Drop AnalyticsVidhya — already engaged."></textarea>
          </div>
          <div class="panel-actions" style="justify-content:flex-start;margin-top:6px;">
            <button class="btn primary" id="btn-feedback">Re-run with feedback</button>
          </div>

          <div class="field" style="margin-top:18px;">
            <label class="lbl">Form 2 — feature request (admin queue, no auto-build)</label>
            <textarea id="f-frq" placeholder="e.g. Add a column showing past training programs (counts) per candidate. Or — save query templates by domain."></textarea>
          </div>
          <div class="panel-actions" style="justify-content:flex-start;margin-top:6px;">
            <button class="btn" id="btn-frq">Submit feature request</button>
          </div>
        </div>` : ''}

      ${b.steering ? `<div class="panel" style="margin-top:14px;">
        <h3>Specific direction & feedback history</h3>
        <div style="font-size:13.5px;color:var(--ink-2);white-space:pre-wrap;">${esc(b.steering)}</div>
      </div>` : ''}

      ${(b.roles || []).length ? `<div class="panel" style="margin-top:14px;">
        <h3>Roles in this brief</h3>
        ${(b.roles || []).map((r, i) => `
          <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;display:grid;grid-template-columns:24px 1.4fr 1fr 1fr 60px;gap:10px;">
            <span style="color:var(--ink-3);font-family:monospace;">${i + 1}.</span>
            <span style="font-weight:500;">${esc(r.title || '—')}</span>
            <span style="color:var(--ink-3);">${esc(r.skill || '')}</span>
            <span style="color:var(--ink-3);">${esc(r.bucket || '')}</span>
            <span style="font-family:monospace;text-align:right;">×${r.count || 1}</span>
          </div>
        `).join('')}
      </div>` : ''}
    </div>
  `;

  // wiring
  const logBox = m.querySelector('.log');
  if (logBox) logBox.scrollTop = logBox.scrollHeight;

  const rtb = document.getElementById('btn-retry');
  if (rtb) rtb.addEventListener('click', async () => {
    try {
      await api('POST', '/api/briefs/' + encodeURIComponent(b.id) + '/retry');
      await loadBriefs(); startPolling(); renderMain(); renderSidebar();
      toast('Retrying…', 'success');
    } catch (e) { toast(e.message, 'error'); }
  });

  const fb = document.getElementById('btn-feedback');
  if (fb) fb.addEventListener('click', async () => {
    const text = document.getElementById('f-feedback').value.trim();
    if (!text) { toast('Type the feedback first.', 'error'); return; }
    fb.disabled = true; fb.textContent = 'Re-running…';
    try {
      await api('POST', '/api/briefs/' + encodeURIComponent(b.id) + '/feedback', { feedback: text });
      await loadBriefs(); startPolling(); renderMain(); renderSidebar();
      toast('Feedback applied — re-running.', 'success');
    } catch (e) { toast(e.message, 'error'); fb.disabled = false; fb.textContent = 'Re-run with feedback'; }
  });

  const frb = document.getElementById('btn-frq');
  if (frb) frb.addEventListener('click', async () => {
    const text = document.getElementById('f-frq').value.trim();
    if (!text) { toast('Type the feature request first.', 'error'); return; }
    frb.disabled = true; frb.textContent = 'Submitting…';
    try {
      await api('POST', '/api/feature-requests', { text, contextBriefId: b.id });
      document.getElementById('f-frq').value = '';
      toast('Feature request queued. Gulshan will review.', 'success');
      frb.disabled = false; frb.textContent = 'Submit feature request';
    } catch (e) { toast(e.message, 'error'); frb.disabled = false; frb.textContent = 'Submit feature request'; }
  });

  const fullBtn = document.getElementById('btn-run-full');
  if (fullBtn) fullBtn.addEventListener('click', async () => {
    fullBtn.disabled = true; fullBtn.textContent = 'Starting…';
    try {
      await api('POST', '/api/briefs/' + encodeURIComponent(b.id) + '/retry');
      await loadBriefs(); startPolling(); renderMain(); renderSidebar();
      toast('Full pipeline running.', 'success');
    } catch (e) { toast(e.message, 'error'); fullBtn.disabled = false; fullBtn.textContent = 'Run full pipeline'; }
  });
}

function formatDuration(seconds) {
  const s = parseInt(seconds, 10) || 0;
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  const r = s % 60;
  return m + 'm' + (r ? ' ' + r + 's' : '');
}

/* ============================================================ */
/* UTILS                                                        */
/* ============================================================ */
function esc(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
let toastTimer = null;
function toast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3200);
}

/* ============================================================ */
/* BOOT                                                         */
/* ============================================================ */
(async function init() {
  if (state.token) {
    try { await loadBriefs(); } catch (e) {}
  }
  render();
})();
</script>
</body>
</html>
