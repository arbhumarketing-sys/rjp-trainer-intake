  const sources = p.sources || defaultSourceMap();
  // Count active LEAVES (perplexity counts only when key is configured)
  const allLeafKeys = SOURCE_OPTIONS.flatMap(sourceLeafKeys);
  const activeLeafCount = allLeafKeys.filter(k => {
    if (k === 'perplexity' && !state.perplexityConfigured) return false;
    return !!sources[k];
  }).length;
  const totalLeafCount = allLeafKeys.length;
  const sourcesSummary = `${activeLeafCount} of ${totalLeafCount} sources enabled${state.perplexityConfigured ? '' : ' (Perplexity awaiting API key)'}`;

  const renderRow = (s) => {
    const disabled = s.needsKey && !state.perplexityConfigured;
    const isOn = !!sources[s.key];
    return `
      <label class="src-row ${disabled ? 'disabled' : ''}" title="${esc(s.sub || '')}">
        <input type="checkbox" data-src="${esc(s.key)}" ${isOn && !disabled ? 'checked' : ''} ${disabled ? 'disabled' : ''} />
        <span class="src-label">
          <span class="src-name">${esc(s.label)}</span>
          ${s.sub ? `<span class="src-sub">${esc(s.sub)}</span>` : ''}
        </span>
        ${s.needsKey ? `<span class="src-status ${state.perplexityConfigured ? 'ok' : 'pending'}">${state.perplexityConfigured ? '✓ Active' : '🔒 Awaiting API key'}</span>` : ''}
      </label>
    `;
  };
  const renderGroup = (g) => {
    const childKeys = g.children.map(c => `${g.key}_${c.key}`);
    const onCount = childKeys.filter(k => sources[k]).length;
    const allOn = onCount === childKeys.length;
    const someOn = onCount > 0 && !allOn;
    const summary = allOn ? 'all' : (onCount === 0 ? 'none' : `${onCount} of ${childKeys.length}`);
    return `
      <div class="src-group">
        <label class="src-row src-parent">
          <input type="checkbox" data-grp="${esc(g.key)}" ${allOn ? 'checked' : ''} ${someOn ? 'data-indeterminate="1"' : ''} />
          <span class="src-label">
            <span class="src-name">${esc(g.label)} <span class="src-grp-count">(${summary})</span></span>
          </span>
        </label>
        <div class="src-children">
          ${g.children.map(c => `
            <label class="src-row src-child" title="${esc(c.sub)}">
              <input type="checkbox" data-src="${esc(g.key + '_' + c.key)}" data-grpparent="${esc(g.key)}" ${sources[`${g.key}_${c.key}`] ? 'checked' : ''} />
              <span class="src-label">
                <span class="src-name">${esc(c.label)}</span>
                <span class="src-sub">${esc(c.sub)}</span>
              </span>
            </label>
          `).join('')}
        </div>
      </div>
    `;
  };
  const sourceCheckboxes = SOURCE_OPTIONS.map(s => s.children ? renderGroup(s) : renderRow(s)).join('');

  document.getElementById('chat-body').innerHTML = `
    <div class="panel">
      <div class="parsed-card">
        <div class="pf-grid">
          <div class="pf-label">Title</div>          <div><input id="cp-title" value="${esc(p.title || '')}" placeholder="e.g. Splunk Observability Trainer + Lab Setup" /></div>
          <div class="pf-label">Domain</div>         <div><input id="cp-domain" value="${esc(suggestedDomain)}" placeholder="e.g. Splunk, Salesforce, AWS" /></div>
          <div class="pf-label">Keywords</div>       <div><textarea id="cp-keywords" rows="3" placeholder="One per line, e.g.&#10;Splunk Observability Trainer&#10;Splunk Cloud Consultant">${esc(chatArrToLines(p.keywords))}</textarea></div>
          <div class="pf-label">Must include</div>   <div><textarea id="cp-must" rows="2" placeholder="e.g. certified, freelance">${esc(chatArrToLines(p.must))}</textarea></div>
          <div class="pf-label">Should include</div> <div><textarea id="cp-should" rows="2" placeholder="e.g. ITSI, MLTK, dashboards">${esc(chatArrToLines(p.should))}</textarea></div>
          <div class="pf-label">Must NOT</div>       <div><textarea id="cp-mustnot" rows="2" placeholder="e.g. intern, junior">${esc(chatArrToLines(p.mustNot))}</textarea></div>
          <div class="pf-label">Mode</div>           <div>
            <div class="mode-toggle" id="cp-mode">
              <button type="button" data-m="std"   class="${(p.searchMode || 'std') === 'std' ? 'on' : ''}">Standard</button>
              <button type="button" data-m="niche" class="${p.searchMode === 'niche' ? 'on' : ''}">Niche</button>
            </div>
          </div>
          <div class="pf-label">Custom exclusions</div><div><textarea id="cp-customex" rows="2" placeholder="One per line. Big-firm list (TCS/Wipro/etc.) is auto-applied.">${esc(chatArrToLines(p.customExclusions))}</textarea></div>
        </div>
      </div>

      <details class="src-panel" style="margin-top:12px;">
        <summary>
          <span class="src-summary-label">Search sources</span>
          <span class="src-summary-count">${esc(sourcesSummary)}</span>
        </summary>
        <div class="src-list">${sourceCheckboxes}</div>
      </details>

      ${state.chatCritique ? chatRenderCritiquePanel(state.chatCritique) : chatRenderQualityPanel()}

      <div class="panel-actions">
        <button class="btn" id="btn-chat-back">← Back</button>
        <button class="btn primary" id="btn-chat-questions" ${state.chatLoading ? 'disabled' : ''}>${state.chatLoading ? (state.chatLoadingMessage || 'Working…').replace(/…$/, '…') : 'Continue to follow-ups →'}</button>
      </div>
      ${state.chatLoading ? renderLoadingMeter(state.chatLoadingMessage || 'Working…', state.chatLoadingEta || 6) : ''}
    </div>
  `;
  // v3.27.0 — source-toggle checkboxes. Three handlers: leaf, child, parent.
  // Parent click -> set all children to match new state.
  // Child click  -> just update child; parent's checked + indeterminate visual updates.
  // Set indeterminate property on render (HTML attr can't carry tri-state).
  document.querySelectorAll('.src-row input[data-indeterminate="1"]').forEach(cb => { cb.indeterminate = true; });

  function recomputeSummary() {
    const sources = state.chatParsed.sources;
    const activeLeaves = SOURCE_OPTIONS.flatMap(sourceLeafKeys).filter(k => {
      if (k === 'perplexity' && !state.perplexityConfigured) return false;
      return !!sources[k];
    }).length;
    const total = SOURCE_OPTIONS.flatMap(sourceLeafKeys).length;
    const lbl = document.querySelector('.src-summary-count');
    if (lbl) lbl.textContent = `${activeLeaves} of ${total} sources enabled${state.perplexityConfigured ? '' : ' (Perplexity awaiting API key)'}`;
  }

  function refreshGroupParent(grpKey) {
    const grp = SOURCE_OPTIONS.find(o => o.key === grpKey);
    if (!grp || !grp.children) return;
    const childKeys = grp.children.map(c => `${grp.key}_${c.key}`);
    const onCount = childKeys.filter(k => state.chatParsed.sources[k]).length;
    const allOn = onCount === childKeys.length;
    const someOn = onCount > 0 && !allOn;
    const parentCb = document.querySelector(`input[data-grp="${grpKey}"]`);
    if (parentCb) { parentCb.checked = allOn; parentCb.indeterminate = someOn; }
    const cnt = parentCb && parentCb.closest('.src-group').querySelector('.src-grp-count');
    if (cnt) cnt.textContent = `(${allOn ? 'all' : onCount === 0 ? 'none' : `${onCount} of ${childKeys.length}`})`;
  }

  // Leaf checkboxes (top-level non-grouped, like LinkedIn / YouTube / etc.)
  document.querySelectorAll('.src-row input[data-src]:not([data-grpparent])').forEach(cb => {
    cb.addEventListener('change', () => {
      state.chatParsed.sources = state.chatParsed.sources || defaultSourceMap();
      state.chatParsed.sources[cb.dataset.src] = cb.checked;
      recomputeSummary();
      saveChatDraft();
    });
  });

  // Child checkboxes (under a group)
  document.querySelectorAll('.src-row input[data-src][data-grpparent]').forEach(cb => {
    cb.addEventListener('change', () => {
      state.chatParsed.sources = state.chatParsed.sources || defaultSourceMap();
      state.chatParsed.sources[cb.dataset.src] = cb.checked;
      refreshGroupParent(cb.dataset.grpparent);
      recomputeSummary();
      saveChatDraft();
    });
  });

  // Parent checkboxes (group select-all)
  document.querySelectorAll('.src-row input[data-grp]').forEach(cb => {
    cb.addEventListener('change', () => {
      state.chatParsed.sources = state.chatParsed.sources || defaultSourceMap();
      const grp = SOURCE_OPTIONS.find(o => o.key === cb.dataset.grp);
      if (!grp || !grp.children) return;
      grp.children.forEach(c => {
        const flatKey = `${grp.key}_${c.key}`;
        state.chatParsed.sources[flatKey] = cb.checked;
        const childCb = document.querySelector(`input[data-src="${flatKey}"]`);
        if (childCb) childCb.checked = cb.checked;
      });
      cb.indeterminate = false;
      const cnt = cb.closest('.src-group').querySelector('.src-grp-count');
      if (cnt) cnt.textContent = `(${cb.checked ? 'all' : 'none'})`;
      recomputeSummary();
      saveChatDraft();
    });
  });
  document.querySelectorAll('#cp-mode button').forEach(b => b.addEventListener('click', () => {
    state.chatParsed.searchMode = b.dataset.m;
    document.querySelectorAll('#cp-mode button').forEach(x => x.classList.toggle('on', x.dataset.m === state.chatParsed.searchMode));
  }));
  document.getElementById('btn-chat-back').addEventListener('click', () => {
    state.chatStep = 1; renderChat(document.getElementById('main'));
  });
  document.getElementById('btn-chat-questions').addEventListener('click', chatHandleAskQuestions);

  // v3.34.0 — Critique panel buttons. Apply mutates state.chatParsed with the
  // rewrites then proceeds; Keep proceeds with current values. Either way we
  // clear the critique and go straight to ask-questions.
  const applyBtn = document.getElementById('btn-critique-apply');
  if (applyBtn) applyBtn.addEventListener('click', async () => {
    const crit = state.chatCritique;
    if (crit && Array.isArray(crit.confident_rewrites)) {
      crit.confident_rewrites.forEach(rw => {
        if (!rw || !rw.field) return;
        const allowed = ['keywords', 'must', 'should', 'mustNot'];
        if (!allowed.includes(rw.field)) return;
        const val = Array.isArray(rw.newValue) ? rw.newValue : (rw.newValue ? [rw.newValue] : []);
        state.chatParsed[rw.field] = val;
      });
      saveChatDraft();
      toast(`Applied ${crit.confident_rewrites.length} improvement${crit.confident_rewrites.length > 1 ? 's' : ''}.`, 'success');
    }
    state.chatCritique = null;
    chatProceedToAskQuestions();
  });

  const keepBtn = document.getElementById('btn-critique-keep');
  if (keepBtn) keepBtn.addEventListener('click', () => {
    state.chatCritique = null;
    chatProceedToAskQuestions();
  });

  // v3.32.0 — live quality panel updates as operator edits keywords / must-have
  // (only when no critique is showing — critique takes precedence)
  ['cp-keywords', 'cp-must'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      state.chatParsed.keywords = chatLinesToArr(document.getElementById('cp-keywords').value);
      state.chatParsed.must     = chatLinesToArr(document.getElementById('cp-must').value);
      // Live update only the static quality panel; critique stays as-is until next Continue click
      if (!state.chatCritique) {
        const panel = document.getElementById('chat-quality-panel');
        if (panel) panel.outerHTML = chatRenderQualityPanel();
      }
    });
  });
}

// v3.34.0 — Extracted from chatHandleAskQuestions so the critique-Apply / Keep
// buttons can call it without re-running the critique pass.
async function chatProceedToAskQuestions() {
  state.chatLoading = true;
  state.chatLoadingMessage = 'Generating clarifying questions…';
  state.chatLoadingEta = 10;
  renderChatStep2();
  try {
    const r = await api('POST', '/api/briefs/ask-questions', {
      ...state.chatParsed,
      raw: state.chatInput,
    });
    state.chatQuestions = r.questions || [];
    state.chatAnswers = {};
    state.chatLoading = false;
    state.chatStep = 3;
    saveChatDraft();
    renderChat(document.getElementById('main'));
  } catch (e) {
    state.chatLoading = false;
    toast('Question generation failed: ' + e.message + '. Skipping to submit.', 'error');
    state.chatQuestions = [];
    state.chatStep = 4;
    renderChat(document.getElementById('main'));
  }
}

function chatCollectStep2() {
  state.chatParsed = state.chatParsed || {};
  state.chatParsed.title    = (document.getElementById('cp-title').value || '').trim();
  state.chatParsed.domain   = (document.getElementById('cp-domain').value || '').trim();
  state.chatParsed.keywords = chatLinesToArr(document.getElementById('cp-keywords').value);
  state.chatParsed.must     = chatLinesToArr(document.getElementById('cp-must').value);
  state.chatParsed.should   = chatLinesToArr(document.getElementById('cp-should').value);
  state.chatParsed.mustNot  = chatLinesToArr(document.getElementById('cp-mustnot').value);
  state.chatParsed.customExclusions = chatLinesToArr(document.getElementById('cp-customex').value);
  // v3.26.0 — source toggles already updated live via change handlers; ensure default exists
  if (!state.chatParsed.sources) state.chatParsed.sources = defaultSourceMap();
  saveChatDraft();  // v3.14.0
}

async function chatHandleAskQuestions() {
  chatCollectStep2();
  state.chatCritique = null;  // clear any stale critique from prior click

  // v3.32.0 → v3.34.0 — Static quality check still serves as a fast-path
  // BLOCKING gate (must.length===0). Soft warnings now come from the LLM
  // critique pass instead.
  const qc = chatQualityCheck(state.chatParsed || {});
  if (qc.blocking.length) {
    toast(`Please fix the highlighted issue${qc.blocking.length > 1 ? 's' : ''} before continuing — see the red box above.`, 'error');
    renderChatStep2();
    return;
  }

  // v3.34.0 — Run the critique pass: LLM compares raw input to parsed fields,
  // returns confident_rewrites + issues. ~3-5s. Falls back gracefully on error.
  state.chatLoading = true;
  state.chatLoadingMessage = 'Reviewing your inputs against your description…';
  state.chatLoadingEta = 4;
  renderChatStep2();
  try {
    const cr = await api('POST', '/api/briefs/critique', {
      rawInput: state.chatInput || '',
      parsed: state.chatParsed,
    });
    state.chatLoading = false;
    state.chatCritique = cr.critique || { issues: [], confident_rewrites: [] };
    const hasRewrites = (state.chatCritique.confident_rewrites || []).length > 0;
    const hasIssues   = (state.chatCritique.issues || []).length > 0;
    if (hasRewrites || hasIssues) {
      // Hold on Step 2 with critique panel rendered
      renderChatStep2();
      return;
    }
    // No issues, no rewrites — proceed silently to ask-questions
    state.chatCritique = null;
  } catch (e) {
    // Critique failed — log and proceed; never block the operator on a network/LLM error
    console.warn('[critique] failed; proceeding without:', e.message);
    state.chatLoading = false;
    state.chatCritique = null;
  }

  // Critique was clean (or errored gracefully) — proceed
  await chatProceedToAskQuestions();
}

function renderChatStep3() {
  const qs = state.chatQuestions || [];
  if (!qs.length) {
    document.getElementById('chat-body').innerHTML = `
      <div class="panel">
        <div class="hint">No clarifying questions generated — the draft is complete enough. Continuing to submit.</div>
        <div class="panel-actions">
          <button class="btn" id="btn-chat-back">← Back</button>
          <button class="btn primary" id="btn-chat-skip-q">Continue to submit →</button>
        </div>
      </div>
    `;
    document.getElementById('btn-chat-back').addEventListener('click', () => { state.chatStep = 2; renderChat(document.getElementById('main')); });
    document.getElementById('btn-chat-skip-q').addEventListener('click', () => { state.chatStep = 4; renderChat(document.getElementById('main')); });
    return;
  }
  const cards = qs.map(q => {
    const ans = state.chatAnswers[q.id];
    const choices = q.choices.map(c => {
      const isOn = q.multiSelect
        ? (Array.isArray(ans) && ans.includes(c.id))
        : (ans === c.id);
      return `<button type="button" class="q-choice ${isOn ? 'on' : ''}" data-q="${esc(q.id)}" data-c="${esc(c.id)}">${esc(c.label)}</button>`;
    }).join('');
    return `
      <div class="q-card" data-qid="${esc(q.id)}">
        <div class="q-text">${esc(q.question)}${q.multiSelect ? '<span class="q-multi-hint">(pick all that apply)</span>' : ''}</div>
        <div class="q-choices">${choices}</div>
      </div>
    `;
  }).join('');
  const answeredCount = Object.keys(state.chatAnswers).length;
  document.getElementById('chat-body').innerHTML = `
    <div class="panel">
      <div class="panel-sub">${qs.length} question${qs.length === 1 ? '' : 's'} · ${answeredCount} answered. All optional — answers refine the search via steering.</div>
      ${cards}
      <div class="panel-actions" style="margin-top:14px;">
        <button class="btn" id="btn-chat-back">← Back</button>
        <button class="btn primary" id="btn-chat-to-submit">Continue to submit →</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.q-choice').forEach(b => b.addEventListener('click', () => {
    const qid = b.dataset.q;
    const cid = b.dataset.c;
    const q = state.chatQuestions.find(x => x.id === qid);
    if (!q) return;
    if (q.multiSelect) {
      const cur = Array.isArray(state.chatAnswers[qid]) ? state.chatAnswers[qid].slice() : [];
      const i = cur.indexOf(cid);
      if (i >= 0) cur.splice(i, 1); else cur.push(cid);
      if (cur.length) state.chatAnswers[qid] = cur; else delete state.chatAnswers[qid];
    } else {
      if (state.chatAnswers[qid] === cid) delete state.chatAnswers[qid];
      else state.chatAnswers[qid] = cid;
    }
    saveChatDraft();  // v3.14.0
    renderChatStep3();
  }));
  document.getElementById('btn-chat-back').addEventListener('click', () => { state.chatStep = 2; renderChat(document.getElementById('main')); });
  document.getElementById('btn-chat-to-submit').addEventListener('click', () => { state.chatStep = 4; renderChat(document.getElementById('main')); });
}

function chatBuildClarifyingBlock() {
  const lines = [];
  for (const q of (state.chatQuestions || [])) {
    const ans = state.chatAnswers[q.id];
    if (!ans) continue;
    const labels = (Array.isArray(ans) ? ans : [ans])
      .map(a => (q.choices.find(c => c.id === a) || {}).label)
      .filter(Boolean);
    if (!labels.length) continue;
    lines.push(`- ${q.question} ${labels.join(', ')}`);
  }
  return lines.length ? 'CLARIFYING ANSWERS (operator chose these in chat-flow):\n' + lines.join('\n') : '';
}

function renderChatStep4() {
  const p = state.chatParsed || {};
  const clarifyBlock = chatBuildClarifyingBlock();
  const finalSteering = [(p.steering || '').trim(), clarifyBlock].filter(Boolean).join('\n\n').trim();

  document.getElementById('chat-body').innerHTML = `
    <div class="panel">
      <div class="parsed-card">
        <div class="pf-grid">
          <div class="pf-label">Title</div>          <div>${esc(p.title || '(none)')}</div>
          <div class="pf-label">Domain</div>         <div>${esc(p.domain || '(none)')}</div>
          <div class="pf-label">Keywords</div>       <div>${(p.keywords || []).map(esc).join('<br>') || '<span style="color:var(--ink-4);">(none)</span>'}</div>
          <div class="pf-label">Must include</div>   <div>${(p.must || []).map(esc).join('<br>') || '—'}</div>
          <div class="pf-label">Should include</div> <div>${(p.should || []).map(esc).join('<br>') || '—'}</div>
          <div class="pf-label">Must NOT</div>       <div>${(p.mustNot || []).map(esc).join('<br>') || '—'}</div>
          <div class="pf-label">Mode</div>           <div>${p.searchMode === 'niche' ? 'Niche' : 'Standard'}</div>
          <div class="pf-label">Custom exclusions</div><div>${(p.customExclusions || []).map(esc).join('<br>') || '—'}</div>
          <div class="pf-label">Steering</div>       <div style="white-space:pre-wrap;font-family:'Menlo',monospace;font-size:12px;background:var(--bg);padding:8px 10px;border-radius:4px;">${esc(finalSteering) || '<span style=\"color:var(--ink-4);font-family:inherit;\">(none)</span>'}</div>
        </div>
      </div>

      ${chatRenderQualityPanel()}

      ${(() => {
        // v3.33.0 — auto-detect test runs from title/operator. User can untick if wrong.
        const titleLow = String(p.title || '').toLowerCase();
        const opEmail = String((state.operator && state.operator.email) || state.chatOpEmail || '').toLowerCase();
        const looksTest = /\b(test|iter\d|smoke|e2e|verify|qa|debug|sandbox)\b/i.test(titleLow) || /test|qa|e2e/i.test(opEmail);
        const checked = (state.chatIsTest != null) ? state.chatIsTest : looksTest;
        return `<div style="margin-top:14px;padding:10px 12px;background:${checked ? '#FFFBEB' : '#F8FAFC'};border:1px solid ${checked ? '#FCD34D' : '#E2E8F0'};border-radius:6px;font-size:13px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="chat-is-test" ${checked ? 'checked' : ''} style="margin:0;" />
            <span><strong>${checked ? '⚙ Test / internal run' : 'Mark as test run'}</strong>
              <span style="color:var(--ink-3);font-size:12px;margin-left:6px;">${checked ? '— excluded from cross-brief learning, separated in analytics' : '— check this for QA / debugging runs you don\'t want to influence real-brief priors'}</span>
            </span>
          </label>
        </div>`;
      })()}

      ${state.operator ? `
      <div style="margin-top:14px;padding:10px 12px;background:#f1f5f9;border-radius:4px;font-size:12.5px;color:#334155;">
        Submitting as <strong>${esc(state.operator.name)}</strong> · ${esc(state.operator.email)}
        <a href="#" id="chat-switch-op" style="margin-left:8px;color:#1E40AF;text-decoration:underline;font-size:11.5px;">Switch</a>
      </div>
      ` : `
      <div class="field" style="margin-top:14px;">
        <label class="lbl">Operator name <span style="color:var(--ink-3);font-weight:400;font-size:11.5px;">— for the audit trail</span></label>
        <input id="chat-op-name" placeholder="e.g. your name" value="${esc(state.chatOpName || '')}" />
      </div>
      <div class="field">
        <label class="lbl">Operator email</label>
        <input id="chat-op-email" type="email" placeholder="you@rjpinfotek.com" value="${esc(state.chatOpEmail || '')}" />
      </div>`}

      <div class="panel-actions">
        <button class="btn" id="btn-chat-back">← Back to questions</button>
        <button class="btn primary" id="btn-chat-submit" ${state.chatLoading ? 'disabled' : ''}>${state.chatLoading ? 'Submitting…' : '✓ Submit & start sourcing'}</button>
      </div>
    </div>
  `;
  if (state.operator) {
    state.chatOpName = state.operator.name;
    state.chatOpEmail = state.operator.email;
    const sw = document.getElementById('chat-switch-op');
    if (sw) sw.addEventListener('click', (e) => { e.preventDefault(); if (confirm('Clear saved identity and switch user?')) { clearOperator(); render(); showWelcomeModal(); } });
  } else {
    document.getElementById('chat-op-name').addEventListener('input', e => state.chatOpName = e.target.value);
    document.getElementById('chat-op-email').addEventListener('input', e => state.chatOpEmail = e.target.value);
  }
  // v3.33.0 — test-flag toggle, with visual update on toggle
  const testCb = document.getElementById('chat-is-test');
  if (testCb) {
    testCb.addEventListener('change', () => {
      state.chatIsTest = testCb.checked;
      renderChatStep4();
    });
  }
  document.getElementById('btn-chat-back').addEventListener('click', () => {
    state.chatStep = state.chatQuestions.length ? 3 : 2;
    renderChat(document.getElementById('main'));
  });
  document.getElementById('btn-chat-submit').addEventListener('click', chatHandleSubmit);
}

async function chatHandleSubmit() {
  const name = (state.chatOpName || '').trim();
  const email = (state.chatOpEmail || '').trim();
  if (!name) { toast('Please enter operator name.', 'error'); return; }
  if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { toast('Please enter a valid email.', 'error'); return; }

  // v3.32.0 — final input-quality guard. Blocking issues (e.g. missing must-have)
  // stop the submit; the operator is sent back to Step 2 with the red box visible.
  const qc = chatQualityCheck(state.chatParsed || {});
  if (qc.blocking.length) {
    toast(`Please add a must-have skill before submitting — see Step 2.`, 'error');
    state.chatStep = 2;
    renderChat(document.getElementById('main'));
    return;
  }

  // v3.13.0 — first chat-submit also captures identity for future briefs.
  // No-op if a stored operator already matches; harmless overwrite otherwise.
  saveOperator(name, email);

  const p = state.chatParsed || {};
  const clarifyBlock = chatBuildClarifyingBlock();
  const finalSteering = [(p.steering || '').trim(), clarifyBlock].filter(Boolean).join('\n\n').trim();

  state.chatLoading = true;
  renderChatStep4();
  try {
    const payload = {
      title: p.title || (Array.isArray(p.keywords) && p.keywords[0]) || 'Chat-flow brief',
      domain: p.domain || '',
      geo: 'India',
      keywords: p.keywords || [],
      must: p.must || [],
      should: p.should || [],
      mustNot: p.mustNot || [],
      customExclusions: p.customExclusions || [],
      searchMode: p.searchMode === 'niche' ? 'niche' : 'std',
      steering: finalSteering,
      operator: { name, email },
      // v3.26.0 — pass source toggles (operator-controlled in Step 2)
      advanced: { sources: p.sources || defaultSourceMap() },
      rawInput: state.chatInput || '',
      // v3.33.0 — derive isTest from the explicit toggle, falling back to auto-detect
      isTest: (() => {
        if (state.chatIsTest != null) return state.chatIsTest;
        const titleLow = String(p.title || '').toLowerCase();
        const opEmail = String(email || '').toLowerCase();
        return /\b(test|iter\d|smoke|e2e|verify|qa|debug|sandbox)\b/i.test(titleLow) || /test|qa|e2e/i.test(opEmail);
      })(),
      // Chat flow already engaged the operator with question-driven refinement
      // — pipeline can skip its own auto-cleaner (no double-Haiku).
      confirmedClean: true,
    };
    const r = await api('POST', '/api/briefs', payload);
    await loadBriefs();
    state.activeBriefId = r.brief.id;
    state.view = 'detail';
    clearChatDraft();  // v3.14.0 — submit succeeded, draft is no longer needed
    chatReset();
    state.chatLoading = false;
    startPolling();
    renderMain(); renderSidebar();
    toast('Brief submitted via chat — full pipeline running.', 'success');
  } catch (e) {
    state.chatLoading = false;
    toast(e.message, 'error');
    renderChatStep4();
  }
}

  // v3.1 stage map. Engine emits: queued → discovery → scoring → packaging → complete.
  // Plus: preview / preview_ready for pre-flight.
  const stages = [
    { keys: ['queued'],                       name: 'Queued',      sub: 'Brief accepted' },
    { keys: ['discovery', 'preview'],          name: 'Discovery',   sub: 'Web search across sources + LinkedIn enrichment' },
    { keys: ['scoring'],                       name: 'Scoring',     sub: 'Speaker-aware classifier + reason-traceable accept/reject' },
    { keys: ['packaging'],                     name: 'Packaging',   sub: 'Building Excel with Candidates + Rejected (audit) tabs' },
    { keys: ['complete', 'preview_ready'],     name: 'Done',        sub: 'Output ready' },

  const ix = stages.findIndex(s => s.keys.includes(status));

  const counts = b.counts || {};
  const meta = (s) => {
    if (s.keys.includes('discovery') && counts.discovered) return counts.discovered + ' discovered';
    if (s.keys.includes('scoring') && (counts.accepted || counts.rejected)) return (counts.accepted || 0) + ' accepted / ' + (counts.rejected || 0) + ' rejected';
    if (s.keys.includes('packaging') && counts.accepted) return counts.accepted + ' rows';

  // TAT widget

  const isComplete = status === 'complete' || status === 'preview_ready';
  const isOver = !isComplete && tatElapsed > tatTarget;
  const tatHTML = `
    <div class="tat-bar ${isComplete ? 'done' : (isOver ? 'over' : '')}">
      <span class="tat-dot"></span>
      <span><strong>${isComplete ? 'TAT' : 'TAT — live'}:</strong> ${formatDuration(tatElapsed)} ${isComplete ? '' : ' / ' + formatDuration(tatTarget) + ' target'} ${b.mode === 'niche' ? '(Niche)' : '(Standard)'} </span>
      ${(b.timings || []).length ? '<span style="margin-left:auto;color:var(--ink-3);font-size:11.5px;">Stages: ' + b.timings.map(t => {

  const downloadHTML = (status === 'complete')

      ? `<div class="download-bar" style="background:var(--accent-soft);color:var(--accent);border-color:var(--accent);">

      ${isComplete ? `

  `;

  // wiring
  const logBox = m.querySelector('.log');
  if (logBox) logBox.scrollTop = logBox.scrollHeight;

  // v3.9.0 — kick off scores fetch (idempotent — only fires when active brief
  // changes, not on every poll). Triggers a re-render once scores are in.
  if (state.scoresLoadedFor !== b.id && (status === 'complete' || status === 'preview_ready')) {
    loadScoresForBrief(b.id).then(() => {
      if (state.activeBriefId === b.id && state.view === 'detail') renderMain();
    });
  }
  // v3.18.0 — same idempotent kick-off for outreach state.
  if (state.outreachLoadedFor !== b.id && (status === 'complete' || status === 'preview_ready')) {
    loadOutreachForBrief(b.id).then(() => {
      if (state.activeBriefId === b.id && state.view === 'detail') renderMain();
    });
  }

  // v3.18.0 — outreach dropdown change handler
  m.querySelectorAll('.outreach-sel').forEach(sel => {
    sel.addEventListener('change', () => {
      setCandidateOutreach(b.id, sel.dataset.url, sel.dataset.name, sel.value);
    });
  });

  // v3.9.0 — wire verdict buttons (Selected / Hold / Rejected)
  m.querySelectorAll('.verdict-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const url = btn.dataset.url;
      const name = btn.dataset.name;
      const verdict = btn.dataset.verdict;
      if (!url) { toast('No URL on this candidate — can\'t score.', 'error'); return; }
      const current = (state.candidateScores[b.id] || {})[url];
      if (current === verdict) {
        await clearCandidateScore(b.id, url);
      } else {
        await setCandidateScore(b.id, url, name, verdict);
      }
    });
  });

  // v3.17.0 — client lifecycle status dropdown handler
  const csSel = document.getElementById('cs-select');
  if (csSel) csSel.addEventListener('change', (e) => setClientStatus(csSel.dataset.bid, e.target.value));

  const rtb = document.getElementById('btn-retry');
  if (rtb) rtb.addEventListener('click', async () => {
    try {
      await api('POST', '/api/briefs/' + encodeURIComponent(b.id) + '/retry');
      await loadBriefs(); startPolling(); renderMain(); renderSidebar();
      toast('Retrying…', 'success');
    } catch (e) { toast(e.message, 'error'); }
  });

  const fb = document.getElementById('btn-feedback');
  if (fb) fb.addEventListener('click', async () => {
    const text = document.getElementById('f-feedback').value.trim();
    if (!text) { toast('Type the feedback first.', 'error'); return; }
    fb.disabled = true; fb.textContent = 'Re-running…';
    try {
      await api('POST', '/api/briefs/' + encodeURIComponent(b.id) + '/feedback', { feedback: text });
      await loadBriefs(); startPolling(); renderMain(); renderSidebar();
      toast('Feedback applied — re-running.', 'success');
    } catch (e) { toast(e.message, 'error'); fb.disabled = false; fb.textContent = 'Re-run with feedback'; }
  });

  // v3.23.0 — Form 2 (feature-request submission) removed; Form 1 stays as the iteration loop
  const fullBtn = document.getElementById('btn-run-full');
  if (fullBtn) fullBtn.addEventListener('click', async () => {
    fullBtn.disabled = true; fullBtn.textContent = 'Starting…';
    try {
      await api('POST', '/api/briefs/' + encodeURIComponent(b.id) + '/retry');
      await loadBriefs(); startPolling(); renderMain(); renderSidebar();
      toast('Full pipeline running.', 'success');
    } catch (e) { toast(e.message, 'error'); fullBtn.disabled = false; fullBtn.textContent = 'Run full pipeline'; }
  });

  // v3.33.0 — test-flag toggle on detail page (backfill old briefs)
  const testCb = document.getElementById('brief-is-test');
  if (testCb) testCb.addEventListener('change', async () => {
    const briefId = testCb.dataset.bid;
    const newVal = testCb.checked;
    testCb.disabled = true;
    try {
      await api('PATCH', '/api/briefs/' + encodeURIComponent(briefId) + '/test-flag', { isTest: newVal });
      // mutate local cached brief so re-render reflects the new label
      const cached = state.briefs.find(x => x.id === briefId);
      if (cached) cached.isTest = newVal;
      if (state.liveBrief && state.liveBrief.id === briefId) state.liveBrief.isTest = newVal;
      toast(newVal ? 'Marked as test run — excluded from learning.' : 'Marked as real run.', 'success');
      renderMain(); renderSidebar();
    } catch (e) {
      toast('Could not update flag: ' + e.message, 'error');
      testCb.checked = !newVal;
    }
    testCb.disabled = false;
  });

  // v3.2 — danger zone delete handler
  const delBtn = document.getElementById('btn-delete-brief');
  if (delBtn) delBtn.addEventListener('click', async () => {
    const title = b.title || '(untitled brief)';
    if (!confirm(`Permanently delete "${title}" (${b.id}) and its Excel output?\n\nThis cannot be undone.`)) return;
    delBtn.disabled = true;
    delBtn.textContent = 'Deleting…';
    try {
      await api('DELETE', '/api/briefs/' + encodeURIComponent(b.id));
      // Drop from local state and navigate home
      state.briefs = state.briefs.filter(x => x.id !== b.id);
      state.activeBriefId = null;
      state.liveBrief = null;
      stopPolling();
      state.view = 'home';
      renderMain();
      renderSidebar();
      toast(`Deleted "${title.slice(0, 50)}".`, 'success');
    } catch (e) {
      toast(e.message, 'error');
      delBtn.disabled = false;
      delBtn.textContent = 'Delete this brief';
    }
  });
}

function formatDuration(seconds) {
  const s = parseInt(seconds, 10) || 0;
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  const r = s % 60;
  return m + 'm' + (r ? ' ' + r + 's' : '');
}

/* ============================================================ */
/* UTILS                                                        */
/* ============================================================ */
function esc(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
let toastTimer = null;
function toast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3200);
}

/* ============================================================ */
/* BOOT                                                         */
/* ============================================================ */
(async function init() {
  // v3.13.0 — hydrate persistent operator BEFORE render so the header chip
  // and the chat skip-step logic see the right state on first paint.
  state.operator = loadOperator();
  if (state.operator) {
    state.chatOpName  = state.operator.name;
    state.chatOpEmail = state.operator.email;
  }

  // v3.15.0 — hydrate sidebar filter so reload preserves user's narrowing
  state.sidebarFilter = loadSidebarFilter();

  if (state.token) {
    try { await loadBriefs(); } catch (e) {}
  }
  render();

  // First-visit welcome modal — only when no stored identity AND we're not
  // mid-deep-link to a specific brief (avoid overlay-on-top-of-context).
  if (!state.operator) showWelcomeModal();

  // Fire-and-forget — backend warmth check runs in parallel with first render
  // so the user sees the UI immediately and the pill updates a moment later.
  checkBackend();
  startHealthLoop();
})();
</script>
</body>
